<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="200" fill="#f0f0f0" stroke="#cccccc" stroke-width="2"/>

  <!-- Banner text -->
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="28" font-weight="bold"
        text-anchor="middle" fill="#666666">Banner Placeholder</text>

  <!-- Subtitle -->
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="16"
        text-anchor="middle" fill="#999999">800 x 200px</text>

  <!-- Corner indicators -->
  <circle cx="50" cy="50" r="20" fill="#e0e0e0" stroke="#cccccc" stroke-width="1"/>
  <circle cx="750" cy="50" r="20" fill="#e0e0e0" stroke="#cccccc" stroke-width="1"/>
  <circle cx="50" cy="150" r="20" fill="#e0e0e0" stroke="#cccccc" stroke-width="1"/>
  <circle cx="750" cy="150" r="20" fill="#e0e0e0" stroke="#cccccc" stroke-width="1"/>
</svg>
