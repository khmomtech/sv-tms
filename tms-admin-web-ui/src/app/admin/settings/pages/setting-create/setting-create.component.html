<!-- setting-create.component.html -->
<div class="flex-wrap p-6 mx-auto">
  <div class="container p-6 mx-auto bg-white rounded-lg">
    <h2 class="mb-4 text-2xl font-bold">Create / Update Setting</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
        <div>
          <label class="font-semibold after:content-['*'] after:text-red-500">Group Code</label>
          <input class="w-full input" placeholder="e.g., system.core" formControlName="groupCode" />
        </div>
        <div>
          <label class="font-semibold after:content-['*'] after:text-red-500">Key Code</label>
          <input class="w-full input" placeholder="e.g., appName" formControlName="keyCode" />
        </div>
        <div>
          <label>Type</label>
          <select class="w-full input" formControlName="typeHint">
            <option>STRING</option>
            <option>NUMBER</option>
            <option>BOOLEAN</option>
            <option>JSON</option>
            <option>PASSWORD</option>
            <option>URL</option>
            <option>EMAIL</option>
            <option>LIST</option>
            <option>MAP</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4 mt-4 md:grid-cols-3">
        <div>
          <label class="font-semibold after:content-['*'] after:text-red-500">Scope</label>
          <select class="w-full input" formControlName="scope">
            <option value="GLOBAL">GLOBAL</option>
            <option value="ROLE">ROLE</option>
            <option value="USER">USER</option>
            <option value="TENANT">TENANT</option>
            <option value="SITE">SITE</option>
          </select>
        </div>
        <div *ngIf="isScoped()">
          <label class="font-semibold after:content-['*'] after:text-red-500">Scope Ref</label>
          <input
            class="w-full input"
            placeholder="tenantId, siteId, role, or userId"
            formControlName="scopeRef"
          />
        </div>
        <div>
          <label class="font-semibold after:content-['*'] after:text-red-500">Reason</label>
          <input class="w-full input" placeholder="why this change?" formControlName="reason" />
        </div>
      </div>

      <div class="mt-4">
        <label class="font-semibold after:content-['*'] after:text-red-500">Value</label>
        <textarea
          *ngIf="form.value.typeHint === 'JSON'"
          rows="6"
          class="w-full input"
          placeholder='{"k":"v"}'
          formControlName="value"
        ></textarea>
        <input
          *ngIf="form.value.typeHint !== 'JSON'"
          class="w-full input"
          placeholder="value..."
          formControlName="value"
        />
      </div>

      <div class="flex justify-end gap-4 mt-6">
        <button type="submit" class="btn btn-primary" [disabled]="saving || form.invalid">
          {{ saving ? 'Saving...' : 'Save Setting' }}
        </button>
      </div>
    </form>

    <div *ngIf="lastSaved" class="p-4 mt-6 border rounded bg-green-50">
      <div class="font-semibold">Saved</div>
      <pre class="mt-2 whitespace-pre-wrap">{{ lastSaved | json }}</pre>
    </div>
  </div>
</div>
