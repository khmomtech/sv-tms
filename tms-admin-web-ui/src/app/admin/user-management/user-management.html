<div class="container p-6 mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-3xl font-bold">User Management</h2>
    <div class="text-sm text-gray-600">
      <span
        class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800"
      >
        {{ users.length }} user{{ users.length !== 1 ? 's' : '' }}
      </span>
    </div>
  </div>

  <!-- Action buttons -->
  <div class="flex flex-wrap gap-4 mb-6">
    <button
      (click)="openCreateDialog()"
      type="button"
      class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition flex items-center gap-2"
    >
      <mat-icon fontIcon="add" class="text-base"></mat-icon>
      Create User
    </button>
  </div>

  <!-- Users table -->
  <div class="bg-white border rounded-lg shadow overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
            >
              ID
            </th>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
            >
              Username
            </th>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
            >
              Email
            </th>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
            >
              Roles
            </th>
            <th
              class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider"
            >
              Actions
            </th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let user of users" class="hover:bg-gray-50">
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
              {{ user.id }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ user.username }}</td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ user.email }}</td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="flex flex-wrap gap-1">
                <span
                  *ngFor="let role of user.roles"
                  class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800"
                >
                  {{ role }}
                </span>
              </div>
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium">
              <div class="flex gap-2">
                <button
                  (click)="openEditDialog(user)"
                  class="text-indigo-600 hover:text-indigo-900 p-1 rounded"
                  title="Edit user"
                >
                  <mat-icon fontIcon="edit" class="text-base"></mat-icon>
                </button>
                <button
                  (click)="deleteUser(user)"
                  class="text-red-600 hover:text-red-900 p-1 rounded"
                  title="Delete user"
                >
                  <mat-icon fontIcon="delete" class="text-base"></mat-icon>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="users.length === 0" class="hover:bg-gray-50">
            <td colspan="5" class="px-6 py-8 text-center text-sm text-gray-500">
              <mat-icon fontIcon="people" class="text-4xl text-gray-300 mb-2"></mat-icon>
              <div>No users found</div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
