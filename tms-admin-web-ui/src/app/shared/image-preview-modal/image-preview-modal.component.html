<div class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-80">
  <div class="relative w-full max-w-4xl p-4 bg-white rounded shadow-lg">
    <button
      (click)="onClose()"
      class="absolute text-xl text-gray-600 top-2 right-2 hover:text-red-500"
    >
      ✖
    </button>

    <div class="flex items-center justify-between mb-4">
      <button (click)="onPrev()" [disabled]="currentIndex === 0">⟨ Prev</button>
      <div class="text-gray-600">{{ currentIndex + 1 }} / {{ images.length }}</div>
      <button (click)="onNext()" [disabled]="currentIndex === images.length - 1">Next ⟩</button>
    </div>

    <div class="overflow-hidden text-center max-h-[70vh]">
      <img
        [src]="images[currentIndex]"
        [style.transform]="'scale(' + zoom + ')'"
        class="inline-block max-w-full max-h-[65vh] rounded shadow"
      />
    </div>

    <div class="flex items-center justify-center mt-4 space-x-4">
      <button (click)="onZoomIn()">🔍 Zoom In</button>
      <button (click)="onZoomOut()">🔎 Zoom Out</button>
    </div>
  </div>
</div>
