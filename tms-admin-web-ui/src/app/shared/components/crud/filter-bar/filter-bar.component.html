<div class="filter-bar flex flex-wrap items-center gap-3 w-full">
  <!-- Search Input - Modern Design -->
  <div class="flex-1 min-w-[280px] relative">
    <div class="relative">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          ></path>
        </svg>
      </span>
      <input
        type="text"
        [formControl]="searchControl"
        [placeholder]="searchPlaceholder"
        [attr.aria-label]="searchPlaceholder"
        class="w-full pl-10 pr-10 py-2.5 text-sm text-gray-900 placeholder-gray-500 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all"
      />
      <button
        *ngIf="searchControl.value && showClear"
        (click)="clearSearch()"
        type="button"
        aria-label="Clear search"
        class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 transition-colors"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Filter Chips - Pill Style -->
  <div *ngIf="filterChips.length > 0" class="flex flex-wrap items-center gap-2">
    <div
      *ngFor="let chip of filterChips"
      class="inline-flex items-center gap-2 px-3 py-1.5 bg-indigo-50 text-indigo-700 rounded-full text-xs font-medium border border-indigo-200"
      [attr.aria-label]="chip.label + ': ' + chip.value"
    >
      <span class="font-semibold">{{ chip.label }}:</span>
      <span>{{ chip.value }}</span>
      <button
        *ngIf="chip.removable !== false"
        (click)="onRemoveChip(chip)"
        [attr.aria-label]="'Remove ' + chip.label + ' filter'"
        class="ml-1 hover:bg-indigo-200 rounded-full p-0.5 transition-colors"
        type="button"
      >
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
          <path
            fill-rule="evenodd"
            d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z"
            clip-rule="evenodd"
          ></path>
        </svg>
      </button>
    </div>
  </div>

  <!-- Clear All Button -->
  <button
    *ngIf="hasFilters && showClear"
    (click)="onClearAll()"
    type="button"
    aria-label="Clear all filters"
    class="inline-flex items-center gap-2 px-4 py-2 bg-red-50 text-red-700 border border-red-300 rounded-lg hover:bg-red-100 transition-colors text-sm font-medium"
  >
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
      ></path>
    </svg>
    Clear All
  </button>

  <!-- Additional Content Projection -->
  <div class="flex items-center gap-2">
    <ng-content></ng-content>
  </div>
</div>
