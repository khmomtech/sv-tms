<div class="address-modal-backdrop">
  <div class="address-modal-shell">
    <div class="address-modal-header">
      <div>
        <h3 class="address-modal-title">Add Bill To Address</h3>
        <p class="address-modal-subtitle">
          Create a billing destination for the selected customer.
        </p>
      </div>
      <button
        type="button"
        class="address-modal-close"
        (click)="close.emit()"
        [disabled]="loading"
        aria-label="Close"
      >
        ×
      </button>
    </div>

    <form [formGroup]="addressForm" (ngSubmit)="save()" class="address-modal-form">
      <section class="address-modal-section">
        <h4 class="address-modal-section-title">Billing Profile</h4>
        <div class="address-form-grid">
          <div class="address-field">
            <label class="address-label address-label-required">Name</label>
            <input class="input w-full" formControlName="name" />
          </div>
          <div class="address-field">
            <label class="address-label">Email</label>
            <input class="input w-full" formControlName="email" />
          </div>
        </div>

        <div class="address-field">
          <label class="address-label address-label-required">Address</label>
          <textarea class="input w-full address-textarea" formControlName="address"></textarea>
        </div>

        <div class="address-form-grid">
          <div class="address-field">
            <label class="address-label">City</label>
            <input class="input w-full" formControlName="city" />
          </div>
          <div class="address-field">
            <label class="address-label">State</label>
            <input class="input w-full" formControlName="state" />
          </div>
        </div>

        <div class="address-form-grid">
          <div class="address-field">
            <label class="address-label">Zip</label>
            <input class="input w-full" formControlName="zip" />
          </div>
          <div class="address-field">
            <label class="address-label">Country</label>
            <input class="input w-full" formControlName="country" />
          </div>
        </div>
      </section>

      <section class="address-modal-section">
        <h4 class="address-modal-section-title">Contact Details</h4>
        <div class="address-form-grid">
          <div class="address-field">
            <label class="address-label">Contact Name</label>
            <input class="input w-full" formControlName="contactName" />
          </div>
          <div class="address-field">
            <label class="address-label">Contact Phone</label>
            <input class="input w-full" formControlName="contactPhone" />
          </div>
        </div>

        <div class="address-form-grid">
          <div class="address-field">
            <label class="address-label">Tax ID</label>
            <input class="input w-full" formControlName="taxId" />
          </div>
          <div class="address-field address-field-toggle">
            <label class="address-checkbox-row">
              <input type="checkbox" id="isPrimary" formControlName="isPrimary" />
              <span>Primary bill-to</span>
            </label>
          </div>
        </div>

        <div class="address-field">
          <label class="address-label">Notes</label>
          <textarea class="input w-full address-textarea" formControlName="notes"></textarea>
        </div>
      </section>

      <div *ngIf="error" class="address-error">{{ error }}</div>

      <div class="address-modal-footer">
        <button type="button" class="btn btn-secondary" (click)="close.emit()" [disabled]="loading">
          Cancel
        </button>
        <button type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Saving...' : 'Save' }}
        </button>
      </div>
    </form>
  </div>
</div>
