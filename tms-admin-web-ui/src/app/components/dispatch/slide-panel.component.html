<div *ngIf="visible" aria-modal="true" role="dialog">
  <!-- Overlay -->
  <div class="fixed inset-0 z-40 bg-black bg-opacity-40 backdrop-blur-sm" (click)="close()"></div>

  <!-- Slide-in Panel -->
  <div
    class="fixed inset-y-0 right-0 z-50 w-full max-w-2xl transition-transform duration-300 ease-in-out transform bg-white shadow-xl"
    [class.translate-x-full]="!visible"
    [class.translate-x-0]="visible"
  >
    <div class="flex flex-col h-full p-6">
      <!-- Header -->
      <div class="flex items-center justify-between pb-2 mb-4 border-b">
        <h2 class="text-lg font-semibold text-blue-700">{{ title }}</h2>
        <button (click)="close()" class="text-xl text-gray-500 hover:text-red-600">✖</button>
      </div>

      <!-- Content slot -->
      <ng-content></ng-content>
    </div>
  </div>
</div>
