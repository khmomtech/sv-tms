<div
  *ngIf="visible"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
>
  <div class="w-full max-w-lg p-6 bg-white rounded shadow-lg">
    <h2 class="mb-4 text-lg font-semibold">Plan Trip for Order {{ order?.orderReference }}</h2>

    <form (ngSubmit)="submit()">
      <div class="mb-4">
        <label class="block mb-1 font-medium">Trip Type</label>
        <select
          [(ngModel)]="tripPlan.tripType"
          name="tripType"
          class="w-full p-2 border rounded"
          required
        >
          <option value="">Select Type</option>
          <option value="delivery">Delivery</option>
          <option value="pickup">Pickup</option>
        </select>
      </div>

      <div class="mb-4">
        <label class="block mb-1 font-medium">Truck</label>
        <select
          [(ngModel)]="tripPlan.vehicleId"
          name="vehicleId"
          class="w-full p-2 border rounded"
          required
        >
          <option value="">Select Truck</option>
          <option *ngFor="let vehicle of vehicles" [value]="vehicle.id">
            {{ vehicle.licensePlate }}
          </option>
        </select>
      </div>

      <div class="mb-4">
        <label class="block mb-1 font-medium">Schedule Time</label>
        <input
          [(ngModel)]="tripPlan.scheduleTime"
          name="scheduleTime"
          type="datetime-local"
          class="w-full p-2 border rounded"
          required
        />
      </div>

      <div class="mb-4">
        <label class="block mb-1 font-medium">Estimated Drop Time</label>
        <input
          [(ngModel)]="tripPlan.estimatedDrop"
          name="estimatedDrop"
          type="datetime-local"
          class="w-full p-2 border rounded"
          required
        />
      </div>

      <div class="flex justify-end gap-2 mt-6">
        <button
          type="button"
          (click)="cancel()"
          class="px-4 py-2 text-gray-700 bg-gray-200 rounded"
        >
          Cancel
        </button>
        <button type="submit" class="px-4 py-2 text-white bg-blue-600 rounded">Submit</button>
      </div>
    </form>
  </div>
</div>
