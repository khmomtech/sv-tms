<div class="w-full max-w-md p-6 mx-auto overflow-auto bg-white rounded-xl">
  <h2 class="mb-6 text-2xl font-bold text-gray-800">Send Notification</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
    <!-- Driver Input -->
    <div>
      <label class="block mb-1 text-sm font-medium text-gray-700">Select Driver</label>
      <input
        type="text"
        formControlName="driver"
        placeholder="Type driver name..."
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        (input)="filterDrivers()"
      />
      <ul
        *ngIf="filteredDrivers.length"
        class="mt-1 overflow-y-auto bg-white border border-gray-300 rounded-lg shadow max-h-40"
      >
        <li
          *ngFor="let d of filteredDrivers"
          (click)="selectDriver(d)"
          class="px-4 py-2 cursor-pointer hover:bg-gray-100"
        >
          {{ d.name }}
        </li>
      </ul>
      <p
        *ngIf="form.get('driver')?.invalid && form.get('driver')?.touched"
        class="mt-1 text-sm text-red-600"
      >
        Driver is required.
      </p>
    </div>

    <!-- Title -->
    <div>
      <label class="block mb-1 text-sm font-medium text-gray-700">Title</label>
      <input
        type="text"
        formControlName="title"
        placeholder="Enter title"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <p
        *ngIf="form.get('title')?.invalid && form.get('title')?.touched"
        class="mt-1 text-sm text-red-600"
      >
        Title is required.
      </p>
    </div>

    <!-- Message -->
    <div>
      <label class="block mb-1 text-sm font-medium text-gray-700">Message</label>
      <textarea
        formControlName="message"
        rows="4"
        placeholder="Enter message"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      ></textarea>
      <p
        *ngIf="form.get('message')?.invalid && form.get('message')?.touched"
        class="mt-1 text-sm text-red-600"
      >
        Message is required.
      </p>
    </div>

    <!-- Buttons -->
    <div class="flex justify-end pt-4 space-x-2">
      <button
        type="button"
        (click)="cancel()"
        class="px-4 py-2 text-white bg-gray-500 rounded-lg hover:bg-gray-600"
      >
        Cancel
      </button>
      <button
        type="submit"
        [disabled]="form.invalid"
        class="px-4 py-2 text-white bg-blue-600 rounded-lg hover:bg-blue-700 disabled:opacity-50"
      >
        Send
      </button>
    </div>
  </form>
</div>
