<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur">
  <div class="w-full max-w-2xl p-6 bg-white rounded-xl shadow-lg overflow-y-auto max-h-[90vh]">
    <!-- Header -->
    <div class="flex items-center justify-between pb-2 mb-6 border-b">
      <h2 class="flex items-center gap-2 text-2xl font-semibold text-blue-700">Add or Edit Item</h2>
      <button (click)="closeModal()" class="text-xl text-gray-500 hover:text-red-600">✖</button>
    </div>

    <!-- Form -->
    <form [formGroup]="itemForm" class="space-y-6">
      <!-- Search Items -->
      <div class="relative">
        <input
          type="text"
          [formControl]="searchQuery"
          placeholder="🔍 Search items..."
          class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
          (focus)="showAutocomplete = true"
          (blur)="hideAutocompleteWithDelay()"
        />

        <!-- Autocomplete Suggestions -->
        <ul
          *ngIf="showAutocomplete && items.length > 0"
          class="absolute z-10 w-full mt-1 overflow-y-auto bg-white border rounded-md shadow max-h-48"
        >
          <li *ngFor="let item of items" class="border-b last:border-none">
            <button
              type="button"
              (mousedown)="selectItem(item)"
              class="w-full px-4 py-2 text-left hover:bg-blue-50"
            >
              <strong>{{ item.itemName }}</strong> - {{ item.size }} ({{ item.weight }} kg)
            </button>
          </li>
        </ul>
      </div>

      <!-- Quantity & Unit -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Quantity</label>
          <input type="number" formControlName="quantity" class="w-full p-2 border rounded-md" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Unit</label>
          <select formControlName="unitOfMeasurement" class="w-full p-2 border rounded-md">
            <option *ngFor="let unit of unitOptions" [value]="unit">{{ unit }}</option>
          </select>
        </div>
      </div>

      <!-- Item Info -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Item Name</label>
          <input type="text" formControlName="itemName" class="w-full p-2 border rounded-md" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Item Type</label>
          <input type="text" formControlName="itemType" class="w-full p-2 border rounded-md" />
        </div>
      </div>

      <!-- Pallet Type & Size -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Pallet Type</label>
          <input type="text" formControlName="palletType" class="w-full p-2 border rounded-md" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Size (LxWxH cm)</label>
          <input type="text" formControlName="size" class="w-full p-2 border rounded-md" />
        </div>
      </div>

      <!-- Weight -->
      <div>
        <label class="block text-sm font-medium text-gray-700">Weight</label>
        <input type="text" formControlName="weight" class="w-full p-2 border rounded-md" />
      </div>

      <!-- 🆕 From/To Destination, Warehouse, Department -->
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">From Destination</label>
          <input
            type="text"
            formControlName="fromDestination"
            class="w-full p-2 border rounded-md"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">To Destination</label>
          <input type="text" formControlName="toDestination" class="w-full p-2 border rounded-md" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Warehouse</label>
          <input type="text" formControlName="warehouse" class="w-full p-2 border rounded-md" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Department</label>
          <input type="text" formControlName="department" class="w-full p-2 border rounded-md" />
        </div>
      </div>

      <!-- Actions -->
      <div class="flex justify-end gap-4 pt-4 border-t">
        <button
          type="button"
          (click)="closeModal()"
          class="px-4 py-2 text-gray-800 bg-gray-300 rounded hover:bg-gray-400"
        >
          Cancel
        </button>
        <button
          type="button"
          (click)="saveItem()"
          class="px-4 py-2 text-white bg-blue-600 rounded hover:bg-blue-700"
        >
          Save
        </button>
      </div>
    </form>
  </div>
</div>
