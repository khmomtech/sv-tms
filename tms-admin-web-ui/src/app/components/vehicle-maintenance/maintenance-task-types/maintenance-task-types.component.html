<div class="container p-6 mx-auto">
  <h2 class="mb-4 text-2xl font-bold">Maintenance Task Types</h2>

  <!-- Search & Add Button -->
  <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
    <input
      type="text"
      class="w-full p-2 border rounded md:w-1/3"
      placeholder="Search..."
      [(ngModel)]="searchQuery"
      (input)="applyFilter()"
    />

    <button
      (click)="openModal()"
      class="px-4 py-2 text-white bg-blue-600 rounded hover:bg-blue-700"
    >
      + Add Task Type
    </button>
  </div>

  <!-- Loading Indicator -->
  <div *ngIf="isLoading" class="py-8 text-center">
    <span class="text-gray-500">Loading...</span>
  </div>

  <!-- Task Types Table -->
  <div *ngIf="!isLoading && taskTypes.length > 0" class="overflow-x-auto">
    <table class="w-full border rounded table-auto">
      <thead class="text-left bg-gray-100">
        <tr>
          <th class="p-3">#</th>
          <th class="p-3">Name</th>
          <th class="p-3">Description</th>
          <th class="p-3">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let task of taskTypes; let i = index">
          <td class="p-3">{{ currentPage * pageSize + i + 1 }}</td>
          <td class="p-3">{{ task.name }}</td>
          <td class="p-3">{{ task.description }}</td>
          <td class="p-3 space-x-2">
            <button (click)="openModal(task)" class="text-blue-600 hover:underline">Edit</button>
            <button (click)="deleteTaskType(task.id!)" class="text-red-600 hover:underline">
              Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Empty state -->
  <div *ngIf="!isLoading && taskTypes.length === 0" class="py-10 text-center text-gray-500">
    No task types found.
  </div>

  <!-- Pagination -->
  <div class="flex items-center justify-between mt-6" *ngIf="totalPages > 1">
    <button (click)="prevPage()" [disabled]="currentPage === 0" class="px-3 py-1 border rounded">
      Prev
    </button>
    <span>Page {{ currentPage + 1 }} of {{ totalPages }}</span>
    <button
      (click)="nextPage()"
      [disabled]="currentPage >= totalPages - 1"
      class="px-3 py-1 border rounded"
    >
      Next
    </button>
  </div>

  <!-- Modal -->
  <div
    *ngIf="isModalOpen"
    class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50"
  >
    <div class="w-full max-w-md p-6 bg-white rounded-lg">
      <h3 class="mb-4 text-xl font-bold">
        {{ isEditing ? 'Edit Task Type' : 'Add Task Type' }}
      </h3>

      <!-- Form -->
      <form (ngSubmit)="saveTaskType()" #taskForm="ngForm">
        <div class="mb-4">
          <label class="block mb-1 font-semibold">Name</label>
          <input
            type="text"
            class="w-full p-2 border rounded"
            [(ngModel)]="selectedTaskType.name"
            name="name"
            required
          />
        </div>

        <div class="mb-4">
          <label class="block mb-1 font-semibold">Description</label>
          <textarea
            class="w-full p-2 border rounded"
            [(ngModel)]="selectedTaskType.description"
            name="description"
          ></textarea>
        </div>

        <div class="flex justify-end space-x-2">
          <button type="button" (click)="closeModal()" class="px-4 py-2 border rounded">
            Cancel
          </button>
          <button
            type="submit"
            [disabled]="taskForm.invalid"
            class="px-4 py-2 text-white bg-blue-600 rounded"
          >
            {{ isEditing ? 'Update' : 'Save' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
