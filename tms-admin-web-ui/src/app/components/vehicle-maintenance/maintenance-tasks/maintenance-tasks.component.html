<div class="py-4 container-fluid">
  <!-- 🔷 Page Title -->
  <div class="mb-4 d-flex justify-content-between align-items-center">
    <h2 class="mb-0">Maintenance Tasks</h2>
  </div>

  <!-- 🔍 Search Form -->
  <form
    [formGroup]="searchForm"
    (ngSubmit)="onSearch()"
    class="p-4 mb-4 border border-gray-200 rounded-lg shadow-sm bg-gray-50"
  >
    <div class="grid grid-cols-1 gap-4 md:grid-cols-6">
      <!-- 🔎 Keyword -->
      <input
        type="text"
        formControlName="keyword"
        placeholder="🔎 Search by keyword"
        class="col-span-2 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />

      <!-- 📋 Status -->
      <select
        formControlName="status"
        class="col-span-1 px-4 py-2 bg-white border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option value="">All Status</option>
        <option value="PENDING">Pending</option>
        <option value="COMPLETED">Completed</option>
      </select>

      <!-- 🚗 Vehicle -->
      <select
        formControlName="vehicleId"
        class="col-span-1 px-4 py-2 bg-white border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      >
        <option value="">All Vehicles</option>
        <option *ngFor="let v of vehicleOptions" [value]="v.id">{{ v.licensePlate }}</option>
      </select>

      <!-- 📅 Date Range -->
      <input
        type="date"
        formControlName="dueAfter"
        class="col-span-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      <input
        type="date"
        formControlName="dueBefore"
        class="col-span-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!--  Action Buttons -->
    <div class="flex justify-end gap-2 mt-4">
      <button type="submit" class="px-4 py-2 text-white bg-blue-600 rounded-md hover:bg-blue-700">
        Search
      </button>
      <button
        type="button"
        class="px-4 py-2 text-gray-700 bg-gray-100 border border-gray-300 rounded-md hover:bg-gray-200"
        (click)="clearFilters()"
      >
        Clear
      </button>
    </div>
  </form>

  <!-- 🔄 Loading Indicator -->
  <div *ngIf="isLoading" class="my-5 text-center">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2">Loading...</p>
  </div>

  <!-- 📋 No Records -->
  <div *ngIf="!isLoading && tasks.length === 0" class="text-center alert alert-warning">
    No maintenance tasks found.
  </div>

  <!-- 📊 Tasks Table -->
  <div
    *ngIf="!isLoading && tasks.length > 0"
    class="mt-3 overflow-hidden border border-gray-200 rounded-md shadow-sm"
  >
    <table class="min-w-full text-sm divide-y divide-gray-200">
      <thead class="font-semibold text-left text-gray-700 uppercase bg-gray-100">
        <tr>
          <th class="w-10 px-4 py-3 text-center">#</th>
          <th class="px-4 py-3">Title</th>
          <th class="px-4 py-3">Status</th>
          <th class="px-4 py-3">Vehicle</th>
          <th class="px-4 py-3">Due Date</th>
          <th class="px-4 py-3 text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let task of tasks; index as i" class="hover:bg-gray-50">
          <td class="px-4 py-2 text-center">{{ i + 1 + currentPage * pageSize }}</td>
          <td class="px-4 py-2 whitespace-nowrap">{{ task.title }}</td>
          <td class="px-4 py-2">
            <span
              class="px-3 py-1 text-xs font-semibold rounded-full"
              [ngClass]="{
                'bg-yellow-200 text-yellow-800': task.status === 'PENDING',
                'bg-blue-200 text-blue-800': task.status === 'IN_PROGRESS',
                'bg-green-200 text-green-800': task.status === 'COMPLETED',
                'bg-red-200 text-red-800': task.status === 'CANCELLED',
              }"
            >
              {{ task.status.replace('_', ' ') }}
            </span>
          </td>
          <td class="px-4 py-2 whitespace-nowrap">{{ vehicleMap[task.vehicleId] || '-' }}</td>
          <td class="px-4 py-2 whitespace-nowrap">{{ task.dueDate | date: 'dd-MMM-yyyy' }}</td>
          <td class="px-4 py-2 text-right">
            <button
              class="inline-flex items-center justify-center w-8 h-8 text-blue-600 transition rounded-full hover:text-blue-800 hover:bg-blue-50"
              (click)="editTask(task)"
              title="Edit"
            >
              <i class="bi bi-pencil"></i>
            </button>
            <button
              class="inline-flex items-center justify-center w-8 h-8 text-red-600 transition rounded-full hover:text-red-800 hover:bg-red-50"
              (click)="deleteTask(task)"
              title="Delete"
            >
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
