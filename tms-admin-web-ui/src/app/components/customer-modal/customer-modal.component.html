<div class="fixed inset-0 flex items-center justify-center bg-gray-900 bg-opacity-50">
  <div class="w-1/3 p-6 bg-white rounded-lg shadow-lg">
    <h3 class="mb-4 text-xl font-semibold">Find Customer</h3>

    <input
      type="text"
      [(ngModel)]="searchText"
      (input)="fetchCustomers()"
      placeholder="Search by name, phone, or email"
      class="w-full p-2 mb-4 border rounded-lg"
    />

    <ul *ngIf="customers.length > 0" class="overflow-y-auto max-h-64">
      <li
        *ngFor="let customer of customers"
        (click)="selectCustomer(customer)"
        class="p-2 border-b cursor-pointer hover:bg-gray-100"
      >
        {{ customer.name }} ({{ customer.email }}, {{ customer.phone }})
      </li>
    </ul>

    <div class="flex justify-end mt-4">
      <button (click)="close.emit()" class="px-4 py-2 text-white bg-gray-400 rounded-lg">
        Cancel
      </button>
    </div>
  </div>
</div>
