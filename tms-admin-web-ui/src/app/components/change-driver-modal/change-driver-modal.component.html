<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/75">
  <div class="w-full max-w-md p-6 bg-white rounded shadow-xl">
    <h3 class="mb-4 text-lg font-semibold">{{ 'dispatchList.change_driver' | translate }}</h3>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <!-- Driver Autocomplete Component -->
      <app-driver-autocomplete
        [drivers]="drivers"
        [label]="'dispatchList.select_driver' | translate"
        [placeholder]="'dispatchList.search_driver_by_name_or_phone' | translate"
        [required]="true"
        [showStatus]="true"
        [enableLiveSearch]="true"
        [errorMessage]="
          form.get('driverId')?.invalid && form.get('driverId')?.touched
            ? ('dispatchList.driver_selection_required' | translate)
            : ''
        "
        (searchQuery)="onDriverSearch($event)"
        formControlName="driverId"
      ></app-driver-autocomplete>

      <div class="flex justify-end gap-2 mt-6">
        <button
          type="button"
          (click)="cancel()"
          class="px-4 py-2 border border-gray-300 rounded hover:bg-gray-100"
        >
          {{ 'dispatchList.cancel' | translate }}
        </button>

        <button
          type="submit"
          class="px-4 py-2 text-white bg-blue-600 rounded hover:bg-blue-700 disabled:opacity-50"
          [disabled]="form.invalid"
        >
          {{ 'dispatchList.update' | translate }}
        </button>
      </div>
    </form>
  </div>
</div>
