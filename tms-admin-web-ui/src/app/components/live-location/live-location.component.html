<!--  Google Map with Click Event -->
<google-map
  #map
  width="100%"
  height="500px"
  [zoom]="zoom"
  [center]="center"
  (mapClick)="addMarker($event)"
>
</google-map>

<!--  Marker Actions -->
<div class="mt-4 flex gap-2">
  <button (click)="clearMarkers()" class="px-4 py-2 bg-red-500 text-white rounded">
    Clear Markers
  </button>
</div>

<!--  Show Added Markers with Selection Buttons -->
<ul class="mt-4">
  <li *ngFor="let marker of markers; let i = index" class="mt-2">
    <button (click)="selectMarkerForRoute(i)" class="px-4 py-2 bg-blue-500 text-white rounded">
      Select for Route
    </button>
  </li>
</ul>
