<div class="relative inline-block text-left">
  <!-- Bell Icon -->
  <button
    (click)="onToggle()"
    class="notification-trigger relative flex h-14 w-14 items-center justify-center rounded-full border border-slate-200 bg-slate-50 text-slate-700 transition hover:bg-slate-100"
  >
    <span class="material-icons">notifications</span>
    <span
      *ngIf="unreadCount > 0"
      class="absolute top-0 right-0 flex items-center justify-center min-w-[1.3rem] h-5 px-1 text-[10px] font-bold text-white bg-red-600 rounded-full ring-2 ring-white"
    >
      {{ unreadCount }}
    </span>
  </button>

  <!-- Dropdown -->
  <div
    *ngIf="dropdownOpen"
    class="absolute right-0 z-50 mt-2 bg-white border border-slate-200 rounded-2xl shadow-xl w-80 overflow-hidden"
  >
    <div *ngIf="notifications.length === 0" class="px-4 py-4 text-sm text-gray-500">
      No new notifications
    </div>

    <div *ngIf="notifications.length > 0" class="overflow-y-auto divide-y divide-gray-100 max-h-64">
      <div
        *ngFor="let notif of notifications.slice(0, 5)"
        class="px-4 py-3 text-sm text-gray-800 transition hover:bg-slate-50"
      >
        <div class="font-semibold text-slate-800">{{ notif.title }}</div>
        <div class="mt-1 text-gray-600">{{ notif.message }}</div>
        <div class="mt-2 text-xs text-gray-400">{{ notif.createdAt | date: 'short' }}</div>
      </div>
    </div>

    <div class="px-4 py-3 text-sm text-center border-t border-slate-100 bg-slate-50/50">
      <a href="#" (click)="onViewAll()" class="font-medium text-blue-600 hover:underline"
        >View all notifications</a
      >
    </div>
  </div>
</div>
