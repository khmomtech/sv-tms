# =============================================================================
# SV-TMS Admin Web UI — nginx.conf
# Full config (replaces /etc/nginx/nginx.conf in container)
# Serves Angular SPA + static assets; security headers stripped here so the
# outer reverse proxy (infra/nginx/site.conf) is the single authoritative
# source of security headers — avoids duplicate headers in HTTP responses.
# =============================================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_types         text/plain text/css application/javascript application/json
                       application/xml+rss image/svg+xml font/woff2;

    server {
        listen 80;
        server_name localhost;

        root  /usr/share/nginx/html;
        index index.html;

        # ── Angular SPA routing ────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # index.html: no cache (always fresh for new deploys)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # Content Security Policy for the Angular app
        # Security headers (X-Frame-Options, HSTS, etc.) are set by the outer
        # nginx reverse proxy — do NOT duplicate them here.
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://maps.gstatic.com; \
             style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
             font-src 'self' data: https://fonts.gstatic.com; \
             img-src 'self' data: https: blob:; \
             connect-src 'self' https://*.svtrucking.biz wss://*.svtrucking.biz http://localhost:* ws://localhost:*; \
             frame-src 'self' https://maps.googleapis.com; \
             object-src 'none'; \
             base-uri 'self'; \
             form-action 'self';"
            always;
        add_header Permissions-Policy
            "geolocation=(self), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
            always;

        # ── Static asset caching (fingerprinted files: 1 year) ────────────────
        location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
            access_log off;
            expires    1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ── Graceful error pages ───────────────────────────────────────────────
        error_page 403 404 /index.html;
    }
}
