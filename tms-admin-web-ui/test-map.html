<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Leaflet Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: system-ui;
        }
        #map {
            height: 400px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border: 1px solid #3b82f6;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>🗺️ Leaflet Map Test</h1>
    <p>Testing if Leaflet loads correctly with OpenStreetMap tiles</p>

    <div id="map"></div>

    <div class="info">
        <strong>Test Location:</strong> Phnom Penh, Cambodia<br>
        <strong>Coordinates:</strong> 11.492575, 104.895524<br>
        <div id="status">Loading map...</div>
    </div>

    <script>
        try {
            // Initialize map
            const map = L.map('map').setView([11.492575, 104.895524], 13);

            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19,
            }).addTo(map);

            // Create custom truck marker
            const truckIcon = L.divIcon({
                html: `
                    <div style="
                        background: #ef4444;
                        width: 32px;
                        height: 32px;
                        border-radius: 50%;
                        border: 3px solid white;
                        box-shadow: 0 2px 8px rgba(0,0,0,0.3);
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        font-size: 16px;
                    ">🚚</div>
                `,
                className: 'truck-marker',
                iconSize: [32, 32],
                iconAnchor: [16, 16],
            });

            // Add marker
            const marker = L.marker([11.492575, 104.895524], {
                icon: truckIcon
            }).addTo(map);

            // Add popup
            marker.bindPopup(`
                <div style="font-family: system-ui; min-width: 200px;">
                    <strong style="color: #1e40af; font-size: 14px;">🚚 Driver Location</strong><br>
                    <div style="margin-top: 8px; color: #475569; font-size: 12px;">
                        Phnom Penh, Cambodia<br>
                        Lat: 11.492575, Lng: 104.895524
                    </div>
                    <div style="margin-top: 4px; color: #64748b; font-size: 11px;">
                        Test marker for debugging
                    </div>
                </div>
            `).openPopup();

            document.getElementById('status').innerHTML = '✅ <strong>Map loaded successfully!</strong>';
            document.getElementById('status').style.color = '#16a34a';

        } catch (error) {
            document.getElementById('status').innerHTML = `❌ <strong>Error:</strong> ${error.message}`;
            document.getElementById('status').style.color = '#dc2626';
            console.error('Map error:', error);
        }
    </script>
</body>
</html>
