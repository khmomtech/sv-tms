services:

  # ────────────────────────────────────────────────────────────────────────────
  # Infrastructure Services
  # ────────────────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: svtms-mysql
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_flush_log_at_trx_commit=1
      - --sync_binlog=1
      - --max_connections=300
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: svtms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TELEMATICS_POSTGRES_DB}
      POSTGRES_USER: ${TELEMATICS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TELEMATICS_POSTGRES_PASSWORD}
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TELEMATICS_POSTGRES_USER} -d ${TELEMATICS_POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo:
    image: mongo:6.0
    container_name: svtms-mongo
    restart: unless-stopped
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep -q 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: svtms-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --appendfsync everysec --save 60 1000 --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: svtms-kafka-1
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      KAFKA_KRAFT_MODE: "true"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/kafka-1:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: svtms-kafka-2
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      KAFKA_KRAFT_MODE: "true"
      KAFKA_NODE_ID: "2"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/kafka-2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: svtms-kafka-3
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      KAFKA_KRAFT_MODE: "true"
      KAFKA_NODE_ID: "3"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/kafka-3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ────────────────────────────────────────────────────────────────────────────
  # Application Services — pulled from GHCR, never built on VPS
  # ────────────────────────────────────────────────────────────────────────────
  core-api:
    image: ${IMAGE_REGISTRY}/svtms-core-api:${IMAGE_TAG:-latest}
    container_name: svtms-core-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/${MONGO_DATABASE}
      SPRING_DATA_MONGODB_DATABASE: ${MONGO_DATABASE}
      LOCATION_MONGO_URI: mongodb://mongo:27017/${MONGO_DATABASE}
      LOCATION_MONGO_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_WEBSOCKET_ALLOWED_ORIGINS: ${APP_WEBSOCKET_ALLOWED_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FILE_UPLOAD_BASE_DIR: /app/uploads/
      SPRING_FLYWAY_ENABLED: "true"
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH}
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/uploads:/app/uploads
      - /opt/sv-tms/secrets:/app/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  auth-api:
    image: ${IMAGE_REGISTRY}/svtms-auth-api:${IMAGE_TAG:-latest}
    container_name: svtms-auth-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      core-api:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8083"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8083/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  telematics-api:
    image: ${IMAGE_REGISTRY}/svtms-telematics-api:${IMAGE_TAG:-latest}
    container_name: svtms-telematics-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8082"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${TELEMATICS_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${TELEMATICS_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${TELEMATICS_POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      TELEMATICS_INTERNAL_API_KEY: ${TELEMATICS_INTERNAL_API_KEY}
      MAIN_BACKEND_URL: http://core-api:8080
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      WEBSOCKET_ALLOWED_ORIGINS: ${APP_WEBSOCKET_ALLOWED_ORIGINS}
      LOCATION_MONGO_ENABLED: "true"
      LOCATION_MONGO_URI: mongodb://mongo:27017/${MONGO_DATABASE}
      LOCATION_MONGO_DATABASE: ${MONGO_DATABASE}
      LOCATION_HISTORY_SPOOL_ENABLED: "true"
      LOCATION_HISTORY_SPOOL_DIR: /app/spool/location-history
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/telematics-spool:/app/spool
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8082/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  driver-app-api:
    image: ${IMAGE_REGISTRY}/svtms-driver-app-api:${IMAGE_TAG:-latest}
    container_name: svtms-driver-app-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      core-api:
        condition: service_healthy
      telematics-api:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8084"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      TELEMATICS_PROXY_BASE_URL: http://telematics-api:8082
      TELEMATICS_PROXY_ENABLED: "true"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8084/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  safety-api:
    image: ${IMAGE_REGISTRY}/svtms-safety-api:${IMAGE_TAG:-latest}
    container_name: svtms-safety-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8087"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8087/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  message-api:
    image: ${IMAGE_REGISTRY}/svtms-message-api:${IMAGE_TAG:-latest}
    container_name: svtms-message-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      kafka-1:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8088"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/tms-message-api;MODE=PostgreSQL;AUTO_SERVER=TRUE
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/message-api:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8088/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  api-gateway:
    image: ${IMAGE_REGISTRY}/svtms-api-gateway:${IMAGE_TAG:-latest}
    container_name: svtms-api-gateway
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      core-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
      driver-app-api:
        condition: service_healthy
      telematics-api:
        condition: service_healthy
      safety-api:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8086"
      CORE_API_BASE_URL: http://core-api:8080
      AUTH_API_BASE_URL: http://auth-api:8083
      DRIVER_APP_API_BASE_URL: http://driver-app-api:8084
      TELEMATICS_API_BASE_URL: http://telematics-api:8082
      SAFETY_API_BASE_URL: http://safety-api:8087
      MESSAGE_API_BASE_URL: http://message-api:8088
      GATEWAY_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8086/actuator/health | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s

  admin-web-ui:
    image: ${IMAGE_REGISTRY}/svtms-admin-web-ui:${IMAGE_TAG:-latest}
    container_name: svtms-admin-web-ui
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy

  # ────────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: svtms-nginx
    restart: unless-stopped
    depends_on:
      admin-web-ui:
        condition: service_started
      api-gateway:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/site.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DATA_ROOT:-/srv/svtms}/certs:/etc/letsencrypt:ro
      - ${DATA_ROOT:-/srv/svtms}/webroot:/var/www/certbot

  # ────────────────────────────────────────────────────────────────────────────
  # Monitoring Stack
  # ────────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: svtms-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ${DATA_ROOT:-/srv/svtms}/monitoring/prometheus:/prometheus

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: svtms-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ${DATA_ROOT:-/srv/svtms}/monitoring/alertmanager:/alertmanager

  grafana:
    image: grafana/grafana:11.1.4
    container_name: svtms-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ${DATA_ROOT:-/srv/svtms}/monitoring/grafana:/var/lib/grafana

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: svtms-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: svtms-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

  certbot:
    image: certbot/certbot:v2.6.0
    container_name: svtms-certbot
    entrypoint: ["/bin/sh", "-c"]
    command: "while true; do sleep 86400 & wait; certbot renew --quiet 2>&1 || true; done"
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/certs:/etc/letsencrypt
      - ${DATA_ROOT:-/srv/svtms}/webroot:/var/www/certbot
