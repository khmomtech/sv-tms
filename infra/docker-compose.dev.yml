version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: svlogistics_tms_db
      MYSQL_USER: svtms
      MYSQL_PASSWORD: svtms
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../tms-backend
      dockerfile: Dockerfile
    env_file:
      - ./backend.env
    volumes:
      - ../uploads:/app/uploads
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  frontend:
    image: node:18
    working_dir: /usr/src/app
    volumes:
      - ../tms-frontend:/usr/src/app
    command: npm run start -- --host 0.0.0.0
    ports:
      - "4200:4200"

volumes:
  db_data:
