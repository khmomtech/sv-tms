# =============================================================================
# SV-TMS Nginx Reverse Proxy — svtms.svtrucking.biz
# =============================================================================
# HTTP → HTTPS redirect + certbot ACME challenge
# HTTPS → proxy to all backend services
# =============================================================================

# ── Shared proxy headers (reduces repetition) ─────────────────────────────────
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP: redirect to HTTPS (allow certbot challenge) ─────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name svtms.svtrucking.biz;

    # Let's Encrypt / certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: main server block ───────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name svtms.svtrucking.biz;

    # ── SSL certificates (managed by certbot) ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/svtms.svtrucking.biz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/svtms.svtrucking.biz/privkey.pem;

    # Modern SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout          5s;

    # ── Security headers ────────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                  always;
    add_header X-Content-Type-Options    "nosniff"                                     always;
    add_header X-XSS-Protection          "1; mode=block"                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy        "geolocation=(self), camera=(self), microphone=(self)" always;

    # Hide nginx version
    server_tokens off;

    # ── Timeouts & buffers ──────────────────────────────────────────────────────
    client_max_body_size    50m;
    proxy_read_timeout      120s;
    proxy_connect_timeout   10s;
    proxy_send_timeout      120s;

    # ── Admin Web UI ────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://admin-web-ui:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Angular SPA fallback — serve index.html for all routes
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # ── API Gateway (all /api/* routes) ────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api-gateway:8086/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Actuator health endpoints (one per service) ─────────────────────────────
    location = /actuator/health {
        proxy_pass         http://api-gateway:8086/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/actuator/ {
        proxy_pass         http://auth-api:8083/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /core/actuator/ {
        proxy_pass         http://core-api:8080/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /driver/actuator/ {
        proxy_pass         http://driver-app-api:8084/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /telematics/actuator/ {
        proxy_pass         http://telematics-api:8082/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /safety/actuator/ {
        proxy_pass         http://safety-api:8087/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /message/actuator/ {
        proxy_pass         http://message-api:8088/actuator/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── File uploads ────────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://api-gateway:8086/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket (SockJS + raw WS) ─────────────────────────────────────────────
    location /ws {
        proxy_pass          http://core-api:8080/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location /ws-sockjs {
        proxy_pass          http://core-api:8080/ws-sockjs;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Telematics live tracking WebSocket ──────────────────────────────────────
    location /telematics/ws {
        proxy_pass          http://telematics-api:8082/ws;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        $connection_upgrade;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;
    }

    # ── Certbot ACME (also needed on HTTPS for renewal) ─────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }
}

# ── Fallback: serve HTTP while cert not yet obtained ──────────────────────────
