global:
  resolve_timeout: 5m

route:
  receiver: default-webhook
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default-webhook
    webhook_configs:
      - url: "http://127.0.0.1:19093/alerts"
        send_resolved: true

  - name: null

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "job"]
