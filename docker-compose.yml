version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sv-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: svlogistics_tms_db
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "3307:3306"

  redis:
    image: redis:7-alpine
    container_name: sv-redis
    restart: always
    ports:
      - "6379:6379"

  kafka:
    image: bitnami/kafka:3.8
    container_name: sv-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  core-api:
    build:
      context: .
      dockerfile: tms-core-api/Dockerfile
    container_name: sv-core-api
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - mysql
      - redis
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_FLYWAY_ENABLED: "false"
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/svlogistics_tms_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MANAGEMENT_HEALTH_DB_ENABLED: "false"
      MANAGEMENT_HEALTH_MONGO_ENABLED: "false"
    volumes:
      - uploads-data:/app/uploads:rw
      - uploads-init:/app/uploads-init:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/ | grep -E '^(200|401)$'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      default:
        aliases:
          - backend

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: sv-api-gateway
    restart: always
    ports:
      - "127.0.0.1:8086:8086"
    depends_on:
      - core-api
    environment:
      SERVER_PORT: 8086
      CORE_API_BASE_URL: http://core-api:8080

  admin-web-ui:
    build: ./tms-admin-web-ui
    container_name: sv-admin-web-ui
    restart: always
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      - api-gateway
    networks:
      default:
        aliases:
          - frontend

volumes:
  uploads-data:
  uploads-init:
