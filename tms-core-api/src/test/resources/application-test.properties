# Test profile overrides for integration tests
# Disable permission initialization during tests to avoid duplicate seeding
permissions.init.enabled=false

# Keep system init disabled in tests
# Test Profile Configuration
# NOTE: spring.profiles.active cannot be set in profile-specific files
# Use @ActiveProfiles("test") in test classes instead

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Use 'create-drop' to recreate schema for each test - tables will be dropped after tests complete
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Disable Hibernate's import.sql loading (we use @Sql annotations instead)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Logging
logging.level.root=WARN
logging.level.com.svtrucking.logistics=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# JWT Configuration (test values)
# Note: JwtUtil uses app.security.jwt.* properties (not legacy jwt.* properties),
# so we set both for compatibility.
app.security.jwt.access-secret=test-access-secret-for-testing-only-32-bytes-!!!!
app.security.jwt.refresh-secret=test-refresh-secret-for-testing-only-32-byt!
app.security.jwt.access-ttl-ms=3600000
app.security.jwt.refresh-ttl-ms=86400000

# Legacy property kept for older code paths (may be used by some tests)
jwt.secret=test-secret-key-for-testing-purposes-only-minimum-256-bits-required-for-hs256-algorithm
jwt.access.expiration=3600000
jwt.refresh.expiration=86400000

# Firebase (mock/disabled for tests)
firebase.enabled=false
firebase.credentials.path=

# Redis (disabled for tests - prevent auto-configuration)
spring.data.redis.host=disabled
spring.session.store-type=none
idempotency.enabled=false

# Disable notification queue (avoids requiring Redis/queue beans in tests)
notification.queue.enabled=false

# WebSocket (disabled for tests)
websocket.enabled=false

# Disable system initialization during tests
app.system.init.enabled=false

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# CORS
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000

# Disable unnecessary auto-configurations for faster tests
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.session.SessionAutoConfiguration,\
  org.springframework.boot.autoconfigure.websocket.servlet.WebSocketServletAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration

# Force-disable location mongo dual-write in tests
location.mongo.enabled=false

# Disable scheduled background tasks during tests to avoid DB race with schema setup
spring.task.scheduling.enabled=false
# Disable Flyway migrations in tests (use Hibernate entity DDL generation instead)
spring.flyway.enabled=false
