# =========================================
#  Application Info
# =========================================
spring.application.name=tms-core-api

# Allow bean definition overriding to resolve cacheManager conflicts
spring.main.allow-bean-definition-overriding=true

# =========================================
# 🔐 JWT / Security (MUST be set via environment variables)
# =========================================
app.security.jwt.access-secret=${JWT_ACCESS_SECRET:SuperSecureKeyForJWTAuthentication2024SuperSecureKeyForJWT}
app.security.jwt.refresh-secret=${JWT_REFRESH_SECRET:SuperSecureKeyForJWTAuthentication2024SuperSecureKeyForJWT-REFRESH}
app.security.jwt.access-ttl-ms=${JWT_ACCESS_TTL_MS:900000}
app.security.jwt.refresh-ttl-ms=${JWT_REFRESH_TTL_MS:2592000000}

# =========================================
# 🌐 Server Settings
# =========================================
server.address=0.0.0.0
server.port=8080

# Local default: do not block driver login on device approval or enterprise checks.
# Override with env vars in stricter environments.
app.driver.skip-device-check=${APP_DRIVER_SKIP_DEVICE_CHECK:true}
app.driver.login-bypass=${APP_DRIVER_LOGIN_BYPASS:true}
# Local default: allow tracking sessions on unapproved devices for developer workflows.
# Set APP_DRIVER_REQUIRE_APPROVED_DEVICE_FOR_TRACKING=true in production/review.
app.driver.require-approved-device-for-tracking=${APP_DRIVER_REQUIRE_APPROVED_DEVICE_FOR_TRACKING:false}

# Local default: keep reviewer/dev bypasses enabled unless explicitly disabled.
app.reviewer.bypass=${APP_REVIEWER_BYPASS:true}
# Local default: allow dispatch workflow emergency bypass for dev/testing.
app.features.dispatch-workflow-emergency-bypass=${APP_FEATURES_DISPATCH_WORKFLOW_EMERGENCY_BYPASS:true}

# Kafka-backed domain event publishing — enabled by default since Kafka is the primary notification channel.
# Set APP_MESSAGING_KAFKA_ENABLED=false in environments without a Kafka broker.
app.messaging.kafka.enabled=${APP_MESSAGING_KAFKA_ENABLED:true}

# =========================================
# 🔥 Encoding (UTF-8 for Khmer/Unicode Support)
# =========================================
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html; charset=UTF-8

# =========================================
# 🌐 CORS Settings (Angular Admin Panel & Flutter App)
# =========================================
# Allow Angular admin, Flutter mobile (emulator/device), and production domain
spring.mvc.cors.allowed-origins=https://svtms.svtrucking.biz,https://svsafety.svtrucking.biz,https://svtmsapi.svtrucking.biz,http://localhost:4200,http://localhost:8080,http://10.0.2.2:8080,http://192.168.0.64:4200
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true
app.cors.allowed-origins=https://svtms.svtrucking.biz,https://svsafety.svtrucking.biz,https://svtmsapi.svtrucking.biz,http://localhost:4200,http://localhost:8080,http://10.0.2.2:8080,http://192.168.0.64:4200
app.websocket.allowed-origins=https://svtms.svtrucking.biz,https://svsafety.svtrucking.biz,https://svtmsapi.svtrucking.biz,http://localhost:4200,http://localhost:8080,http://192.168.0.64:4200

# =========================================
# 🛢️ Database Configuration (MySQL)
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3307/svlogistics_tms_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&zeroDateTimeBehavior=CONVERT_TO_NULL&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=driver
spring.datasource.password=driverpass

# HikariCP connection pool settings (production-ready)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# =========================================
# 🧠 Hibernate JPA Settings
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Performance optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =========================================
# 🔄 Flyway Database Migration
# =========================================
# Disable by default for development (use update schema)
# Enable in production with: spring.flyway.enabled=true
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =========================================
# 🪵 Logging Settings
# =========================================
# Production-optimized: reduce verbosity to minimize performance impact
logging.level.org.springframework=INFO
logging.level.com.svtrucking=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.web.socket=WARN
logging.level.com.svtrucking.logistics.security.JwtUtil=INFO

# Enable DEBUG for specific services during troubleshooting
# logging.level.com.svtrucking.logistics.service.LocationIngestService=DEBUG
# logging.level.com.svtrucking.logistics.service.LiveDriverQueryService=DEBUG

# JSON Serializer Settings
spring.jackson.serialization.fail-on-empty-beans=false

# =========================================
#  File Upload Settings
# =========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# =========================================
# Static Resources (Upload Files, Images)
# =========================================
file.upload.base-dir=uploads/
file.upload.public-prefix=/uploads/
file.upload.dir.licenses=licenses/
file.upload.dir.profiles=profiles/
file.upload.dir.documents=documents/
file.thumbnail.max-width=300
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Expose Prometheus metrics endpoint via Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true

# =========================================
# 🛰️ Location history (MongoDB)
# Disabled by default; set location.mongo.enabled=true and provide URI to dual-write history to Mongo.
location.mongo.enabled=${LOCATION_MONGO_ENABLED:false}
location.mongo.uri=${LOCATION_MONGO_URI:}
location.mongo.database=${LOCATION_MONGO_DB:sv_tms}
# TTL in days for auto-expiry (recommended 60 days for production history retention)
location.mongo.ttl-days=${LOCATION_MONGO_TTL_DAYS:60}
# Disable auto-detection of Mongo repositories unless explicitly enabled via LocationMongoConfig
spring.data.mongodb.repositories.enabled=false

# Location history store strategy
location.history.mysql.write.enabled=${LOCATION_HISTORY_MYSQL_WRITE_ENABLED:false}
location.history.read.require-mongo=${LOCATION_HISTORY_READ_REQUIRE_MONGO:true}

# Local fallback spool when Mongo is unavailable
location.history.spool.enabled=${LOCATION_HISTORY_SPOOL_ENABLED:true}
location.history.spool.dir=${LOCATION_HISTORY_SPOOL_DIR:spool/location-history}
location.history.spool.max-disk-mb=${LOCATION_HISTORY_SPOOL_MAX_DISK_MB:2048}
location.history.spool.replay.batch-size=${LOCATION_HISTORY_SPOOL_REPLAY_BATCH_SIZE:2000}
location.history.spool.replay.interval-ms=${LOCATION_HISTORY_SPOOL_REPLAY_INTERVAL_MS:10000}

# Optional MySQL history cleanup job (for legacy rows)
location.history.mysql.purge.enabled=${LOCATION_HISTORY_MYSQL_PURGE_ENABLED:false}
location.history.mysql.purge.retention-days=${LOCATION_HISTORY_MYSQL_PURGE_RETENTION_DAYS:1}
location.history.mysql.purge.batch-size=${LOCATION_HISTORY_MYSQL_PURGE_BATCH_SIZE:5000}
location.history.mysql.purge.interval-ms=${LOCATION_HISTORY_MYSQL_PURGE_INTERVAL_MS:60000}

google.maps.api.key=${GOOGLE_MAPS_API_KEY:}


# =========================================
# 🔐 Firebase Admin SDK Config
# Only use one of the following options
# =========================================

# Option 1: Inject via env var (recommended). Example:
# export FIREBASE_CONFIG_PATH=/secrets/firebase-adminsdk.json
firebase.config.path=${FIREBASE_CONFIG_PATH:${GOOGLE_APPLICATION_CREDENTIALS:}}

# Option 2: From classpath (e.g., src/main/resources/firebase/)
# firebase.config.path=classpath:firebase/firebase-adminsdk.json

# Option 3: Absolute path (used in Docker or VPS)
# firebase.config.path=/opt/driver-app/sv-driver-app-firebase-adminsdk-fbsvc-52fea00c20.json

# =========================================
# 🔔 Notification push provider (flexible — switch without code changes)
# =========================================
#
#  notification.push.provider selects the active PushProvider.
#  DynamicPushProvider reads this at call-time from the Admin Settings DB
#  (group=notification, key=push.provider) so it can be changed at runtime
#  via POST /api/admin/settings/value without restarting the application.
#  This property acts as the fallback when the DB row does not exist yet.
#
#  Values:
#    kafka — Publish to Kafka topic; downstream consumer forwards to FCM/APNS  ← DEFAULT
#    fcm   — Firebase Cloud Messaging direct send (requires Firebase configured)
#    none  — No-op; log and discard (local dev / CI)
#
notification.push.provider=${NOTIFICATION_PUSH_PROVIDER:kafka}

# Kafka topic names (used when notification.push.provider=kafka)
notification.kafka.topic=${NOTIFICATION_KAFKA_TOPIC:notifications.push}
# Separate topic for high-priority INCOMING_CALL events
notification.kafka.call-topic=${NOTIFICATION_KAFKA_CALL_TOPIC:notifications.call}

# =========================================
# 🔔 Notification queue / delivery mode (MQ-first)
# =========================================
# Enable the Redis-based notification queue. When enabled, notifications are enqueued
# and a background worker drains the queue for delivery.
notification.queue.enabled=${NOTIFICATION_QUEUE_ENABLED:true}
notification.queue.fallback-to-fcm=${NOTIFICATION_QUEUE_FALLBACK_TO_FCM:true}
notification.queue.key=${NOTIFICATION_QUEUE_KEY:notifications:queue}
notification.queue.poll-interval-ms=${NOTIFICATION_QUEUE_POLL_INTERVAL_MS:3000}
notification.queue.max-attempts=${NOTIFICATION_QUEUE_MAX_ATTEMPTS:5}


# =========================================
# 🌐 Content Negotiation (REST API Support)
# =========================================
spring.mvc.contentnegotiation.favor-parameter=true
spring.mvc.contentnegotiation.media-types.json=application/json;charset=UTF-8


# ===============================
# = DRIVER LOCATION TRACKING
# ===============================

# Throttle: minimum time (ms) between two updates from the same driver
tracking.server_throttle_ms=3000

# Distance (meters): bypass throttle if driver moves at least this far
tracking.server_min_distance_m=5

# Flush interval (ms): how often to flush queued location history to stores (Mongo/spool)
tracking.batch_flush_ms=2000

# Max records per batch flush
tracking.batch_max_records=2000

# Buffer size: how many location rows to hold before overflow fallback persists directly
tracking.queue_capacity=50000
tracking.server_min_time_ms=8000
tracking.max_idle_keepalive_ms=60000

# Application API key (partners must send x-api-key)
app.api.key=${APP_API_KEY:417d656f30338167fdd5cb25092c9c2a2a510c8c8d61ec02d70459eced9bcb8b}

# ===============================
# = GEOCODING PROVIDERS
# ===============================
# Primary OSM reverse geocoder (Nominatim)
geocode.osm.enabled=true

# Photon fallback (OSM data, hosted by Komoot or self-hosted)
geocode.photon.enabled=true
geocode.photon.base=https://photon.komoot.io

# Paid Google fallback (set to true only when needed)
geocode.google.enabled=false

# Optional country bias (ISO alpha-2)
geocode.countryBias=KH

# =========================================
# 🔴 Redis Configuration (Live Location Caching)
# =========================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.database=0

# Redis connection pool settings
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# Enable caching
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# Live location cache settings
app.cache.live-location.ttl=300000
app.cache.live-location.prefix=live:location:

# Disable license class enforcement for assignments
app.assignment.enforce-license-class=false

# =========================================
# Telematics service integration
# =========================================
telematics.internal.api-key=${TELEMATICS_INTERNAL_API_KEY:}
telematics.service.url=${TELEMATICS_SERVICE_URL:}
telematics.compatibility-proxy.enabled=${TELEMATICS_COMPATIBILITY_PROXY_ENABLED:false}
telematics.proxy.connect-timeout-ms=${TELEMATICS_PROXY_CONNECT_TIMEOUT_MS:1000}
telematics.proxy.read-timeout-ms=${TELEMATICS_PROXY_READ_TIMEOUT_MS:3000}

# =========================================
# Agora RTC — voice/video calls
# =========================================
# Set via environment variables in production:
#   AGORA_APP_ID         = your 32-char Agora App ID
#   AGORA_APP_CERTIFICATE = your 32-char Agora App Certificate
agora.app-id=${AGORA_APP_ID:REPLACE_WITH_YOUR_AGORA_APP_ID}
agora.app-certificate=${AGORA_APP_CERTIFICATE:REPLACE_WITH_YOUR_AGORA_APP_CERTIFICATE}
# Token validity window in seconds (default 1 hour)
agora.token.expire-seconds=${AGORA_TOKEN_EXPIRE_SECONDS:3600}
