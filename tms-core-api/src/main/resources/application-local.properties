# Disable Flyway for local debugging to bypass MySQL compatibility issue
spring.flyway.enabled=false

# Use Hibernate to manage schema locally
spring.jpa.hibernate.ddl-auto=update
spring.data.jpa.repositories.bootstrap-mode=lazy

# Log SQL for troubleshooting (optional)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Local Development Configuration - Restored Database
spring.datasource.url=jdbc:mysql://localhost:3307/svlogistics_tms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=rootpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JPA Configuration
# Remove duplicates; values defined above apply. Only keep dialect here.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Application API key (partners must send x-api-key)
app.api.key=${APP_API_KEY:417d656f30338167fdd5cb25092c9c2a2a510c8c8d61ec02d70459eced9bcb8b}

# Reviewer and bypass features OFF by default for local. Enable explicitly when needed.
app.reviewer.bypass=true
app.driver.skip-device-check=true
app.driver.login-bypass=true

# Allow local history reads from MySQL when Mongo is not configured.
location.history.read.require-mongo=false

# Agora RTC credentials — replace with real values from console.agora.io
# agora.app-id=YOUR_32_CHAR_AGORA_APP_ID_HERE
# agora.app-certificate=YOUR_32_CHAR_AGORA_APP_CERTIFICATE_HERE

# Local browser + dev-server origins
app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200,http://localhost:8080,http://127.0.0.1:8080
app.websocket.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.web.socket=WARN
logging.level.com.svtrucking.logistics=INFO
