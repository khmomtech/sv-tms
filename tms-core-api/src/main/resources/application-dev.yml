spring:
  datasource:
    url: jdbc:h2:mem:svtms;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ''
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# Enable H2 console for debugging (only in dev profile)
h2:
  console:
    enabled: true
    path: /h2-console

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG

# JWT settings (development)
app:
  security:
    jwt:
      access-ttl-ms: 900000 # 15 minutes
      refresh-ttl-ms: 1209600000 # 14 days
      allowed-clock-skew-seconds: 60