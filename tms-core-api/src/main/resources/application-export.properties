# Export profile: use in-memory H2 with Hibernate auto DDL and disable Flyway
# This avoids depending on versioned migrations for OpenAPI export runs.
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# Disable any startup import/audit initializers during export
app.init-audit=false

# Disable scheduled tasks during export to avoid in-memory DB queries before migrations
spring.task.scheduling.enabled=false
