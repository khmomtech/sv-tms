# =========================================
# 🛢️ Database Configuration (H2 for Testing)
# =========================================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# =========================================
# 🧠 Hibernate JPA Settings
# =========================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# =========================================
# 🔴 Disable Redis Auto-Configuration for Testing
# =========================================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

spring.cache.type=none

# =========================================
# 🔴 Explicitly disable Redis components
# =========================================
spring.data.redis.host=disabled
spring.data.redis.port=6379
spring.cache.redis.enabled=false

# =========================================
# 🔴 Disable Web and MVC features for minimal testing
# =========================================
# Keep basic web functionality but disable complex features
spring.web.resources.static-locations=
spring.web.resources.cache.period=0
spring.web.resources.chain.enabled=false
spring.web.locale=en_US
spring.web.locale-resolver=fixed

# =========================================
# 🔴 Disable Security for testing
# =========================================
spring.security.enabled=true

# =========================================
# 🔴 Disable Actuator endpoints
# =========================================
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=false
management.endpoint.info.enabled=false

# =========================================
# File Upload Configuration (Testing)
# =========================================
file.upload.base-dir=target/test-uploads/
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
