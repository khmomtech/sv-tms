# =========================================
#  Application Info
# =========================================
spring.application.name=tms-core-api

# =========================================
# 🌐 Server Settings (Dev)
# =========================================
server.address=0.0.0.0
server.port=8080

# =========================================
# 🔥 UTF-8 Encoding for Khmer/Unicode
# =========================================
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html; charset=UTF-8

# =========================================
# 🌐 CORS Settings for Dev (Allow localhost)
# =========================================
app.cors.allowed-origins=http://localhost:4200,http://192.168.0.64:4200

# =========================================
# WebSocket Settings for Dev
# =========================================
app.websocket.allowed-origins=http://localhost:4200,http://192.168.0.64:4200

# =========================================
# 🛢️ Database Settings (Dev - in-memory H2 for quick local testing)
# =========================================
# Use H2 in-memory DB in MySQL compatibility mode for local/dev profile so the app can
# boot without a running MySQL server. The DevDataInitializer will seed an admin user.
spring.datasource.url=jdbc:h2:mem:svtms;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# =========================================
# 🧠 Hibernate / JPA Settings
# =========================================
# Let Hibernate create/update schema in-memory during dev
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# =========================================
# 🪵 Logging Settings
# =========================================
logging.level.org.springframework=INFO
logging.level.com.svtrucking=INFO
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.web.socket=WARN

spring.jackson.serialization.fail-on-empty-beans=false

# =========================================
#  File Uploads (Dev Testing)
# =========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# =========================================
# Static Resources (Dev Environment)
# =========================================
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# =========================================
# Driver Login Bypass (Dev Only)
# =========================================
app.driver.skip-device-check=true
app.driver.login-bypass=true
