version: '3.8'

services:
  driver-app:
    build: .
    container_name: driver-app
    ports:
      - "8080:8080"
    volumes:
      - /opt/driver-app/application.properties:/app/application.properties
    environment:
      - SPRING_CONFIG_LOCATION=file:/app/application.properties
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5