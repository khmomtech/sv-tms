services:

  mysql:
    image: mysql:8.0
    container_name: svtms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: svlogistics_tms_db
      MYSQL_USER: driver
      MYSQL_PASSWORD: driverpass
    ports:
      - '3307:3306'
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 90s

  redis:
    image: redis:7-alpine
    container_name: svtms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:6.0
    container_name: svtms-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping')\" || exit 1"]
      interval: 30s
      timeout: 60s
      retries: 10
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    container_name: svtms-postgres
    environment:
      POSTGRES_DB: svlogistics_telematics
      POSTGRES_USER: tele_user
      POSTGRES_PASSWORD: telepass
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tele_user -d svlogistics_telematics"]
      interval: 10s
      retries: 5
      start_period: 10s

  # 🔥 STABLE KAFKA (FINAL FIX)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: svtms-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - kafka-data:/var/lib/kafka/data

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: svtms-kafka-ui
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: sv-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  core-api:
    build:
      context: .
      dockerfile: tms-core-api/Dockerfile
    container_name: svtms-core-api
    depends_on:
      mysql:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/svlogistics_tms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: driver
      SPRING_DATASOURCE_PASSWORD: driverpass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/svlogistics_tms_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_ADDRESS: "0.0.0.0"
    ports:
      - '8080:8080'

  auth-api:
    build:
      context: .
      dockerfile: tms-auth-api/Dockerfile
    container_name: svtms-auth-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/svlogistics_tms_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpass
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: '8083'
    ports:
      - '8083:8083'

  telematics-api:
    build:
      context: ./tms-telematics-api
    container_name: svtms-telematics-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/svlogistics_telematics
      SPRING_DATASOURCE_USERNAME: tele_user
      SPRING_DATASOURCE_PASSWORD: telepass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/svlogistics_telematics
      SERVER_PORT: '8082'
    ports:
      - '8087:8082'

  message-api:
    build:
      context: .
      dockerfile: tms-message-api/Dockerfile
    container_name: svtms-message-api
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVER_PORT: '8088'
    ports:
      - '8088:8088'

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: svtms-api-gateway
    depends_on:
      core-api:
        condition: service_started
    environment:
      SERVER_PORT: '8086'
      # When running core-api locally on host:8080, use host.docker.internal from inside Docker container.
      CORE_API_BASE_URL: http://host.docker.internal:8080
      AUTH_API_BASE_URL: http://auth-api:8083
      DRIVER_APP_API_BASE_URL: http://driver-app-api:8084
      # For container-to-container communication, telematics runs on internal port 8082
      TELEMATICS_API_BASE_URL: http://telematics-api:8082
    ports:
      - '8086:8086'

  angular:
    image: node:20-bullseye
    container_name: svtms-angular
    working_dir: /usr/src/app
    volumes:
      - ./tms-admin-web-ui:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - '4200:4200'
    command: sh -c "npm install --legacy-peer-deps && npm run start -- --host 0.0.0.0"
    depends_on:
      - api-gateway

volumes:
  mysql-data:
  redis-data:
  mongo-data:
  postgres-data:
  kafka-data:

networks:
  default:
    name: svtms-network