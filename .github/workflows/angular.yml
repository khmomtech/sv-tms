name: Frontend CI

# NOTE: This legacy workflow previously targeted the deprecated `tms-frontend` app.
# The authoritative frontend pipeline now lives in `ci-cd.yml` and targets
# `tms-admin-web-ui`. Kept for manual reference only.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tms-admin-web-ui/package-lock.json
      - name: Install dependencies
        run: |
          cd tms-admin-web-ui
          npm ci
      - name: Lint and Build
        run: |
          cd tms-admin-web-ui
          npm run lint
          npm run build -- --configuration production
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: tms-admin-web-ui/dist/
