name: Angular Unit Tests

# NOTE: This legacy workflow previously targeted the deprecated `tms-frontend` app.
# The authoritative frontend/unit-test pipeline now lives in `ci-cd.yml` and
# targets `tms-admin-web-ui`. Kept for manual reference only.

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tms-admin-web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tms-admin-web-ui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Ensure Chrome available
        run: |
          google-chrome --version || sudo apt-get update && sudo apt-get install -y google-chrome-stable || true
      - name: Run unit tests (headless)
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: npm run test:ci
