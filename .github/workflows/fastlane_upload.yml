name: Store Upload

# Manual workflow to build and upload both apps to their respective stores.
# ─────────────────────────────────────────────────────────────────────────────
# Secrets required:
#   iOS:     APP_STORE_CONNECT_API_KEY_ID, APP_STORE_CONNECT_API_ISSUER_ID,
#            APP_STORE_CONNECT_API_KEY_CONTENT (base64 .p8 key),
#            MATCH_PASSWORD, MATCH_GIT_URL
#   Android: DRIVER_KEYSTORE_BASE64, DRIVER_KEY_ALIAS, DRIVER_KEYSTORE_PASSWORD, DRIVER_KEY_PASSWORD
#            CUSTOMER_KEYSTORE_BASE64, CUSTOMER_KEY_ALIAS, CUSTOMER_KEYSTORE_PASSWORD, CUSTOMER_KEY_PASSWORD
#            PLAY_STORE_SERVICE_ACCOUNT_JSON (base64 service account JSON)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      app:
        description: 'Which app to build & upload'
        required: true
        type: choice
        options: [driver, customer, both]
      target:
        description: 'Upload target'
        required: true
        type: choice
        options: [testflight, play-internal, play-beta, play-production]

env:
  FLUTTER_VERSION: '3.24.5'

jobs:
# ── iOS Driver App ─────────────────────────────────────────────────────────
  ios-driver:
    name: iOS – Driver App → TestFlight
    runs-on: macos-latest
    if: inputs.app == 'driver' || inputs.app == 'both'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: tms_driver_app

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: tms_driver_app
        run: flutter pub get

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_CONTENT" | base64 --decode > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Build IPA (prod flavour)
        working-directory: tms_driver_app
        run: |
          flutter build ipa --flavor prod --dart-define=FLAVOR=prod \
            --export-options-plist=ios/exportOptions.plist \
            --build-number=${{ github.run_number }}

      - name: Upload to TestFlight via Fastlane
        working-directory: tms_driver_app
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane ios upload_testflight

# ── iOS Customer App ───────────────────────────────────────────────────────
  ios-customer:
    name: iOS – Customer App → TestFlight
    runs-on: macos-latest
    if: inputs.app == 'customer' || inputs.app == 'both'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby 3.2
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: tms_customer_app

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        working-directory: tms_customer_app
        run: flutter pub get

      - name: Write App Store Connect API key
        env:
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_KEY_CONTENT" | base64 --decode > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Build IPA
        working-directory: tms_customer_app
        run: |
          flutter build ipa \
            --export-options-plist=ios/exportOptions.plist \
            --build-number=${{ github.run_number }}

      - name: Upload to TestFlight via Fastlane
        working-directory: tms_customer_app
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: bundle exec fastlane ios upload_testflight

# ── Android Driver App ─────────────────────────────────────────────────────
  android-driver:
    name: Android – Driver App → Play Store
    runs-on: ubuntu-latest
    if: inputs.app == 'driver' || inputs.app == 'both'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Flutter pub get
        working-directory: tms_driver_app
        run: flutter pub get

      - name: Decode and write keystore
        working-directory: tms_driver_app/android
        env:
          KEYSTORE_BASE64: ${{ secrets.DRIVER_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > driver-release.jks
          cat > key.properties <<EOF
          storeFile=../android/driver-release.jks
          storePassword=${{ secrets.DRIVER_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.DRIVER_KEY_ALIAS }}
          keyPassword=${{ secrets.DRIVER_KEY_PASSWORD }}
          EOF

      - name: Build App Bundle (prod flavour)
        working-directory: tms_driver_app
        run: |
          flutter build appbundle --flavor prod --dart-define=FLAVOR=prod \
            --build-number=${{ github.run_number }} \
            --dart-define=MAPS_API_KEY=${{ secrets.DRIVER_MAPS_API_KEY }}

      - name: Decode Play Store service account
        run: |
          echo "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}" | base64 --decode > /tmp/play-service-account.json

      - name: Upload to Play Store (${{ inputs.target }})
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: /tmp/play-service-account.json
          packageName: com.svtrucking.svdriverapp
          releaseFiles: tms_driver_app/build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: ${{ inputs.target == 'play-production' && 'production' || inputs.target == 'play-beta' && 'beta' || 'internal' }}
          inAppUpdatePriority: 3

# ── Android Customer App ───────────────────────────────────────────────────
  android-customer:
    name: Android – Customer App → Play Store
    runs-on: ubuntu-latest
    if: inputs.app == 'customer' || inputs.app == 'both'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Flutter pub get
        working-directory: tms_customer_app
        run: flutter pub get

      - name: Decode and write keystore
        working-directory: tms_customer_app/android
        env:
          KEYSTORE_BASE64: ${{ secrets.CUSTOMER_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > customer-release.jks
          cat > key.properties <<EOF
          storeFile=../android/customer-release.jks
          storePassword=${{ secrets.CUSTOMER_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.CUSTOMER_KEY_ALIAS }}
          keyPassword=${{ secrets.CUSTOMER_KEY_PASSWORD }}
          EOF

      - name: Build App Bundle
        working-directory: tms_customer_app
        run: |
          flutter build appbundle \
            --build-number=${{ github.run_number }}

      - name: Decode Play Store service account
        run: |
          echo "${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}" | base64 --decode > /tmp/play-service-account.json

      - name: Upload to Play Store (${{ inputs.target }})
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: /tmp/play-service-account.json
          packageName: com.svtrucking.tms_customer_app
          releaseFiles: tms_customer_app/build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.target == 'play-production' && 'production' || inputs.target == 'play-beta' && 'beta' || 'internal' }}
          inAppUpdatePriority: 2
