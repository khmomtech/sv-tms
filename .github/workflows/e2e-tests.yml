name: E2E Test Suite

# NOTE: This legacy workflow previously targeted deprecated `tms-frontend` and
# `driver-app` paths. The authoritative UI regression pipeline now lives in
# `ci-cd.yml` and targets `tms-admin-web-ui`. Kept for manual reference only.

on:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tms-admin-web-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: tms-admin-web-ui
        run: npm ci
      
      - name: Run unit tests
        working-directory: tms-admin-web-ui
        run: npm run test:ci
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: tms-admin-web-ui/coverage/lcov.info
          flags: unit-tests

  integration-tests:
    name: Integration Tests (API + WebSocket)
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tms
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tms-admin-web-ui/package-lock.json
      
      - name: Build and start backend
        working-directory: tms-core-api
        run: |
          ../mvnw -pl tms-core-api -am -DskipTests package
          java -jar target/*.jar &
          echo "Waiting for backend to start..."
          for i in {1..30}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Backend is up!"
              break
            fi
            sleep 2
          done
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/tms
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
      
      - name: Install frontend dependencies
        working-directory: tms-admin-web-ui
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: tms-admin-web-ui
        run: npx playwright install --with-deps chromium
      
      - name: Run integration tests
        working-directory: tms-admin-web-ui
        run: npm run test:integration
        env:
          API_BASE_URL: http://localhost:8080
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: tms-admin-web-ui/test-results/
          retention-days: 7

  e2e-tests:
    name: E2E Flow Tests
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tms
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tms-admin-web-ui/package-lock.json
      
      - name: Build and start backend
        working-directory: tms-core-api
        run: |
          ../mvnw -pl tms-core-api -am -DskipTests package
          java -jar target/*.jar &
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -f http://localhost:8080/actuator/health; then
              echo "Backend ready!"
              break
            fi
            sleep 2
          done
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/tms
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_DATA_REDIS_PORT: 6379
      
      - name: Install frontend dependencies
        working-directory: tms-admin-web-ui
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: tms-admin-web-ui
        run: npx playwright install --with-deps chromium

      - name: Start Angular dev server
        working-directory: tms-admin-web-ui
        run: |
          npm start > /tmp/tms-admin-web-ui.log 2>&1 &
          echo $! > /tmp/tms-admin-web-ui.pid

      - name: Wait for Angular dev server
        run: |
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:4200 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Angular dev server did not become ready in time"
          tail -200 /tmp/tms-admin-web-ui.log || true
          exit 1
      
      - name: Run E2E flow tests
        working-directory: tms-admin-web-ui
        run: npm run test:flows -- --project=chromium
        env:
          BASE_URL: http://localhost:4200
          API_BASE_URL: http://localhost:8080
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: tms-admin-web-ui/test-results/
          retention-days: 7
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tms-admin-web-ui/playwright-report/
          retention-days: 7

      - name: Stop Angular dev server
        if: always()
        run: |
          if [ -f /tmp/tms-admin-web-ui.pid ]; then
            kill "$(cat /tmp/tms-admin-web-ui.pid)" || true
          fi

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tms-admin-web-ui/package-lock.json
      
      - name: Install dependencies
        working-directory: tms-admin-web-ui
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: tms-admin-web-ui
        run: npx playwright install --with-deps chromium

      - name: Start Angular dev server
        working-directory: tms-admin-web-ui
        run: |
          npm start > /tmp/tms-admin-web-ui.log 2>&1 &
          echo $! > /tmp/tms-admin-web-ui.pid

      - name: Wait for Angular dev server
        run: |
          for i in {1..60}; do
            if curl -sf http://127.0.0.1:4200 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Angular dev server did not become ready in time"
          tail -200 /tmp/tms-admin-web-ui.log || true
          exit 1
      
      - name: Run performance tests
        working-directory: tms-admin-web-ui
        run: npm run test:performance -- --project=chromium
        env:
          BASE_URL: http://localhost:4200
      
      - name: Upload performance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-test-results
          path: tms-admin-web-ui/test-results/
          retention-days: 30

      - name: Stop Angular dev server
        if: always()
        run: |
          if [ -f /tmp/tms-admin-web-ui.pid ]; then
            kill "$(cat /tmp/tms-admin-web-ui.pid)" || true
          fi

  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Display test summary
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Unit Tests: Completed" >> $GITHUB_STEP_SUMMARY
          echo "Integration Tests: Completed" >> $GITHUB_STEP_SUMMARY
          echo "E2E Tests: Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View detailed reports in the artifacts section." >> $GITHUB_STEP_SUMMARY
