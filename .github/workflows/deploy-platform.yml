name: Deploy Platform

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest
      image_registry:
        description: Docker registry to deploy from
        required: false
        default: ghcr.io

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Sync infrastructure bundle
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          rsync -az --delete \
            infra/docker-compose.prod.yml \
            infra/.env.example \
            infra/nginx/site.conf \
            infra/scripts/ \
            ${DEPLOY_USER}@${DEPLOY_HOST}:/opt/sv-tms/infra/

      - name: Deploy stack
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          IMAGE_REGISTRY: ${{ inputs.image_registry }}/${{ github.repository_owner }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          ssh -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} \
            "export IMAGE_REGISTRY='${IMAGE_REGISTRY}'; export IMAGE_TAG='${IMAGE_TAG}'; export REGISTRY_USERNAME='${REGISTRY_USERNAME}'; export REGISTRY_PASSWORD='${REGISTRY_PASSWORD}'; bash -s" <<'EOF'
          set -euo pipefail
          cd /opt/sv-tms
          if [[ -n "${REGISTRY_USERNAME:-}" && -n "${REGISTRY_PASSWORD:-}" ]]; then
            registry_host="${IMAGE_REGISTRY%%/*}"
            echo "${REGISTRY_PASSWORD}" | docker login "${registry_host}" -u "${REGISTRY_USERNAME}" --password-stdin
          fi
          docker compose --env-file infra/.env -f infra/docker-compose.prod.yml pull || true
          docker compose --env-file infra/.env -f infra/docker-compose.prod.yml up -d --remove-orphans
          /opt/sv-tms/infra/scripts/post_deploy_smoke.sh
          docker compose --env-file infra/.env -f infra/docker-compose.prod.yml ps
          EOF
