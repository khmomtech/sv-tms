  webview_flutter: ^4.7.0
#  firebase_core: latest
#  firebase_messaging: latest

  # assets:
  #   - assets/images/
  # flutter_barcode_scanner: ^2.0.0
  # google_mlkit_barcode_scanning: ^0.3.0
  # qr_code_scanner_plus: ^2.0.6
  # qr_code_scanner: ^1.0.1
  # qr_code_scanner: ^1.0.1
  web_socket_channel: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.4.9
  built_value_generator: ^8.9.0
  json_serializable: ^6.8.0
  copy_with_extension_gen: ^5.0.4
  mockito: ^5.4.4
# IMPORTANT: flutter_icons must be at the root level, not nested under dev_dependencies
flutter_launcher_icons:
  image_path: "assets/images/icons/prod_icon.png"  #  Default fallback (required)
  android: true
  ios: true
  remove_alpha_ios: true

  flavors:
    dev:
      image_path: "assets/images/icons/dev_icon.png"
      android: true
      ios: true
      android_launcher_name: "Trucking Dev"

    uat:
      image_path: "assets/images/icons/uat_icon.png"
      android: true
      ios: true
      android_launcher_name: "Trucking UAT"

    prod:
      image_path: "assets/images/icons/prod_icon.png"
      android: true
      ios: true
      android_launcher_name: "Trucking"

