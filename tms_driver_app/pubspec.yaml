  easy_localization: ^3.0.7+1
  path_provider: ^2.1.5
  connectivity_plus: ^6.1.4
  package_info_plus: ^8.3.0
  get_it: ^8.0.3
  geocoding: ^4.0.0
  device_info_plus: ^10.0.1
  # app_tracking_transparency: ^2.0.0
  sentry_flutter: ^9.5.0
  battery_plus: ^6.2.3
  android_intent_plus: ^5.3.1
