plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

// Load keystore properties if present at root `key.properties`
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.svtrucking.svdriverapp"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    defaultConfig {
        applicationId = "com.svtrucking.svdriverapp"
        // Minimum SDK 24 for better security and modern Android features
        minSdk = 24
        targetSdk = 36
        versionCode = 2
        versionName = "1.0.1"
        multiDexEnabled true
        
        // Add vector drawable support for older devices
        vectorDrawables.useSupportLibrary = true
    }

    // Signing configs: define release config using key.properties when available
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            } else {
                // fallback to debug keystore to keep builds working in CI/dev
                // (still not suitable for Play Store production uploads)
                storeFile file(System.getenv('HOME') + '/.android/debug.keystore')
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            // Uses key.properties when present (CI/production). Falls back to debug keystore
            // only in local dev. key.properties must NOT be committed to source control.
            signingConfig keystorePropertiesFile.exists() ? signingConfigs.release : signingConfigs.debug
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            
            // Optimize build performance
            ndk {
                debugSymbolLevel 'SYMBOL_TABLE'
            }
        }
        debug {
            minifyEnabled false
            // Enable debug symbols for better crash reporting in dev
            debuggable true
        }
    }

    flavorDimensions "env"

    productFlavors {
        dev {
            dimension "env"
            applicationIdSuffix ".dev"
            versionNameSuffix "-dev"
            resValue "string", "app_name", "Trucking (Dev)"
            isDefault = true
        }
        uat {
            dimension "env"
            applicationIdSuffix ".uat"
            versionNameSuffix "-uat"
            resValue "string", "app_name", "Trucking (UAT)"
        }
        prod {
            dimension "env"
            resValue "string", "app_name", "Trucking"
        }
    }

    

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
        // Enable incremental compilation for faster builds
        freeCompilerArgs += ['-Xjvm-default=all']
    }
    
    // Optimize build performance
    packagingOptions {
        resources {
            excludes += ['/META-INF/{AL2.0,LGPL2.1}', '/META-INF/DEPENDENCIES']
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // Updated AndroidX core libraries
    implementation "androidx.core:core-ktx:1.15.0"
    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.8.7"
    implementation "androidx.activity:activity-ktx:1.9.3"

    // Kotlin standard library
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    
    // MultiDex support for legacy devices
    implementation "androidx.multidex:multidex:2.0.1"
    
    // Java 8+ API desugaring for older Android versions
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"

    // Firebase - using BOM for version consistency
    implementation platform('com.google.firebase:firebase-bom:33.7.0')
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-analytics'

    // Location Services for background tracking
    implementation 'com.google.android.gms:play-services-location:21.3.0'
    
    // OkHttp for network operations
    implementation "com.squareup.okhttp3:okhttp:4.12.0"

    // Preferences and WorkManager
    implementation "androidx.preference:preference-ktx:1.2.1"
    implementation "androidx.work:work-runtime-ktx:2.10.0"
}