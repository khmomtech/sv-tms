# DEPRECATED — single-backend config, does not route to tms-telematics-api.
# For production microservices routing use: nginx_tms_microservices.conf.template
# This file is kept only as a rollback reference for pre-telematics deployments.

# Nginx reverse proxy sample for SockJS/STOMP WebSocket passthrough (driver-app-api)
# Place this in your nginx sites-enabled and reload nginx.

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream tms_driver_app_api {
  server 127.0.0.1:8084;
}

server {
  listen 80;
  server_name svtms.svtrucking.biz;

  # Redirect to HTTPS if you use SSL termination at nginx
  # return 301 https://$host$request_uri;

  location /ws {
    proxy_pass http://tms_driver_app_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
  }

  location /ws-sockjs/ {
    proxy_pass http://tms_driver_app_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
  }

  # Serve frontend / static assets and fallback to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
