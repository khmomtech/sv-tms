spring:
  application:
    name: device-gateway
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/device_gateway}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,configprops,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      access: unrestricted

logging:
  level:
    root: INFO
    org.springframework: INFO

telemetry:
  stream:
    replay:
      fixed-delay-ms: ${TELEMETRY_STREAM_REPLAY_FIXED_DELAY_MS:5000}
      batch-size: ${TELEMETRY_STREAM_REPLAY_BATCH_SIZE:200}
  outbox:
    health:
      warn-oldest-seconds: ${TELEMETRY_OUTBOX_HEALTH_WARN_OLDEST_SECONDS:60}
      fail-oldest-seconds: ${TELEMETRY_OUTBOX_HEALTH_FAIL_OLDEST_SECONDS:300}
