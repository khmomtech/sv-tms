name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '21' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and run tests
        run: |
          # Disable permission seeding during CI tests to avoid init races
          ./mvnw -B -DskipTests=false -Dpermissions.init.enabled=false clean verify

      - name: Upload build artifacts (jar)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: driver-app-jar
          path: driver-app/target/*.jar
