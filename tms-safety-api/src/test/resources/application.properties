spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use Hibernate to create the test schema in-memory for tests (no Flyway)
spring.jpa.hibernate.ddl-auto=create-drop
# Keep Flyway disabled in tests to avoid circular bean dependency
spring.flyway.enabled=false
# Do not defer JPA datasource initialization for tests (use Hibernate DDL + test SQL files)
spring.jpa.defer-datasource-initialization=false

# Prevent Redis and session auto-configuration in tests (we provide mocks via TestRedisConfig)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.autoconfigure.session.SessionAutoConfiguration


# Disable heavy integrations in tests
firebase.enabled=false
# Provide empty firebase config path to avoid placeholder resolution errors in tests
firebase.config.path=
spring.data.redis.host=disabled
spring.session.store-type=none
websocket.enabled=false
app.system.init.enabled=false

logging.level.root=WARN
logging.level.com.svtrucking.logistics=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.tool.hbm2ddl=DEBUG

# Allow test context to override bean definitions when fallback configs and
# production security configs both declare the same bean name (e.g., passwordEncoder).
spring.main.allow-bean-definition-overriding=true

## JWT test secrets (simple, non-production values used for tests)
app.security.jwt.access-secret=testsupersafesecretkeyaccess1234567890
app.security.jwt.refresh-secret=testsupersafesecretkeyrefresh123456
app.security.jwt.access-ttl-ms=3600000
app.security.jwt.refresh-ttl-ms=604800000
app.security.jwt.allowed-clock-skew-seconds=0

## Application defaults used by tests
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000,*
app.api.key=
spring.mvc.locale=en
spring.mvc.locale-resolver=fixed
