spring.application.name=TMS-Backend-WS-IT

# Use in-memory H2 in MySQL compatibility mode for lightweight schema creation
spring.datasource.url=jdbc:h2:mem:tms_backend_ws;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Let Hibernate create/drop schema for the test lifecycle
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Keep integration test logs quieter
logging.level.org.springframework=ERROR
logging.level.com.svtrucking=INFO

# Disable scheduled jobs that are irrelevant for the WebSocket handshake scenario
spring.task.scheduling.enabled=false

# Avoid Firebase initialization during tests
firebase.config.path=
