# Local profile: MySQL + Flyway

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.url=jdbc:mysql://localhost:3307/safety_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=rootpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Enable device check and login bypass for local
app.reviewer.bypass=false
app.driver.skip-device-check=true
app.driver.login-bypass=true

logging.level.org.springframework.security=DEBUG
logging.level.com.svtrucking.logistics=INFO

