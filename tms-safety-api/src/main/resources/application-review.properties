# Review environment profile (non-production).
# Activate with: SPRING_PROFILES_ACTIVE=review

# Keep device approval ON (reviewers still use the normal flow unless explicitly bypassed)
app.driver.skip-device-check=false
app.driver.login-bypass=false

# Enable reviewer bypass features only in this profile
app.reviewer.bypass=true
app.reviewer.username=reviewer@test.sv
# Required for /api/auth/create-reviewer
app.reviewer.create.secret=${APP_REVIEWER_CREATE_SECRET:}

