# =========================================
#  Application Info
# =========================================
spring.application.name=TMS-Safety-Backend

# =========================================
# 🌐 Server Settings (Production)
# =========================================
server.address=0.0.0.0
server.port=8080

# =========================================
# 🔥 UTF-8 Encoding for Khmer/Unicode
# =========================================
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html; charset=UTF-8

# =========================================
# 🌐 CORS Settings for Production
# =========================================
app.cors.allowed-origins=https://svtms.svtrucking.biz

# =========================================
# 🛢️ Database Settings (Production)
# =========================================
# In Docker Compose production, these are overridden by SPRING_DATASOURCE_* env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/svlogistics_tms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:svtms_app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# =========================================
# 🧠 Hibernate / JPA Settings
# =========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==============================
# Flyway Migrations (Production)
# ==============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# If schema already exists, allow baselining to avoid failures on first run
spring.flyway.baseline-on-migrate=true

# =========================================
# 🪵 Logging Settings
# =========================================
logging.level.org.springframework=INFO
logging.level.com.svtrucking=INFO
logging.level.org.springframework.messaging=ERROR
logging.level.org.springframework.web.socket=ERROR

spring.jackson.serialization.fail-on-empty-beans=false

# =========================================
# File Upload Configuration (Production)
# =========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
file.upload.base-dir=/app/uploads/
spring.web.resources.static-locations=file:/app/uploads/,classpath:/static/
