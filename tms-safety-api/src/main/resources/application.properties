# Enable device check and login bypass for all environments
# =========================================
# Safety Backend (Base Defaults)
# =========================================
spring.application.name=tms-safety-api

# =========================================
# Server
# =========================================
server.address=0.0.0.0
server.port=8080

# =========================================
# JWT / Security (MUST come from env in real deployments)
# =========================================
app.security.jwt.access-secret=${JWT_ACCESS_SECRET:}
app.security.jwt.refresh-secret=${JWT_REFRESH_SECRET:}
app.security.jwt.access-ttl-ms=${JWT_ACCESS_TTL_MS:900000}
app.security.jwt.refresh-ttl-ms=${JWT_REFRESH_TTL_MS:2592000000}

# Device approval is ON by default.
app.driver.login-bypass=false
# app.driver.login-bypass is an unknown property; remove duplicate and keep only one occurrence if needed

# Reviewer tooling stays disabled by default; enable only in "review" profile.
app.reviewer.bypass=false

# =========================================
# CORS
# =========================================
# Comma-separated allowlist. In prod, wildcard '*' is rejected by SecurityConfig.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:}

# =========================================
# Database (MySQL)
# =========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/safety_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&zeroDateTimeBehavior=CONVERT_TO_NULL&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:driver}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:driverpass}

# Hibernate: validate schema (Flyway owns DDL in prod/local).
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================================
# Flyway
# =========================================
# Base disables Flyway to allow dev profile to run on H2 without MySQL-specific migrations.
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# =========================================
# Actuator
# =========================================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true

# =========================================
# Uploads
# =========================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
file.upload.base-dir=uploads/
file.upload.public-prefix=/uploads/
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# =========================================
# Logging
# =========================================
logging.level.org.springframework=INFO
logging.level.com.svtrucking=INFO
logging.level.org.hibernate.SQL=WARN
