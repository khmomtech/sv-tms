# =========================================
# 📁 File Upload Configuration
# =========================================

# Base directory for file uploads (relative to application root)
file.upload.base-dir=uploads/

# Public URL prefix for accessing uploaded files
file.upload.public-prefix=/uploads/

# Maximum file size limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# File size limits by type
file.upload.max-size.image=10MB
file.upload.max-size.document=50MB
file.upload.max-size.video=100MB

# Allowed file types (MIME types)
file.upload.allowed-types.images=image/jpeg,image/jpg,image/png,image/gif,image/webp
file.upload.allowed-types.documents=application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,text/plain
file.upload.allowed-types.spreadsheets=application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
file.upload.allowed-types.archives=application/zip,application/x-zip-compressed

# Upload directory structure
file.upload.dir.documents=documents/
file.upload.dir.licenses=licenses/
file.upload.dir.profiles=profiles/
file.upload.dir.temp=temp/

# File naming strategy (UUID or TIMESTAMP)
file.upload.naming-strategy=UUID

# Cleanup settings
file.upload.temp.cleanup-enabled=true
file.upload.temp.cleanup-interval-hours=24
file.upload.temp.max-age-hours=48

# Security settings
file.upload.virus-scan-enabled=false
file.upload.secure-filename=true

# Static resource configuration
spring.web.resources.static-locations=file:uploads/,classpath:/static/
