services:
  mysql:
    image: mysql:8.0
    container_name: svtms-mysql
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_flush_log_at_trx_commit=1
      - --sync_binlog=1
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: svtms-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${TELEMATICS_POSTGRES_DB}
      POSTGRES_USER: ${TELEMATICS_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TELEMATICS_POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - synchronous_commit=on
      - -c
      - full_page_writes=on
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TELEMATICS_POSTGRES_USER} -d ${TELEMATICS_POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging

  mongo:
    image: mongo:6.0
    container_name: svtms-mongo
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    command: ["mongod", "--bind_ip_all"]
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --username ${MONGO_ROOT_USER} --password ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: svtms-redis
    restart: unless-stopped
    env_file:
      - ./.env
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - yes
      - --appendfsync
      - everysec
      - --save
      - "60"
      - "1000"
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging: *default-logging

  kafka-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: svtms-kafka-1
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/kafka-1:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging: *default-logging

  kafka-2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: svtms-kafka-2
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      KAFKA_NODE_ID: "2"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/kafka-2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging: *default-logging

  kafka-3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: svtms-kafka-3
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      KAFKA_NODE_ID: "3"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
      KAFKA_MIN_INSYNC_REPLICAS: "2"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/kafka-3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging: *default-logging

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: svtms-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    ports:
      - "127.0.0.1:8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: svtms-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    logging: *default-logging

  core-api:
    build:
      context: ..
      dockerfile: tms-core-api/Dockerfile
    image: ${IMAGE_REGISTRY:-local}/svtms-core-api:${IMAGE_TAG:-latest}
    container_name: svtms-core-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      SPRING_DATA_MONGODB_DATABASE: ${MONGO_DATABASE}
      LOCATION_MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      LOCATION_MONGO_ENABLED: "true"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_WEBSOCKET_ALLOWED_ORIGINS: ${APP_WEBSOCKET_ALLOWED_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FILE_UPLOAD_BASE_DIR: /app/uploads/
      SPRING_FLYWAY_ENABLED: "true"
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/uploads:/app/uploads
      - ${DATA_ROOT:-/srv/svtms}/uploads-init:/app/uploads-init:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  auth-api:
    build:
      context: ..
      dockerfile: tms-auth-api/Dockerfile
    image: ${IMAGE_REGISTRY:-local}/svtms-auth-api:${IMAGE_TAG:-latest}
    container_name: svtms-auth-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      core-api:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  driver-app-api:
    build:
      context: ..
      dockerfile: tms-driver-app-api/Dockerfile
    image: ${IMAGE_REGISTRY:-local}/svtms-driver-app-api:${IMAGE_TAG:-latest}
    container_name: svtms-driver-app-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      core-api:
        condition: service_healthy
      telematics-api:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      TELEMATICS_PROXY_BASE_URL: http://telematics-api:8082
      TELEMATICS_PROXY_ENABLED: "true"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  telematics-api:
    build:
      context: ../tms-telematics-api
      dockerfile: Dockerfile
    image: ${IMAGE_REGISTRY:-local}/svtms-telematics-api:${IMAGE_TAG:-latest}
    container_name: svtms-telematics-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${TELEMATICS_POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${TELEMATICS_POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${TELEMATICS_POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      TELEMATICS_INTERNAL_API_KEY: ${TELEMATICS_INTERNAL_API_KEY}
      MAIN_BACKEND_URL: http://core-api:8080
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      WEBSOCKET_ALLOWED_ORIGINS: ${APP_WEBSOCKET_ALLOWED_ORIGINS}
      LOCATION_MONGO_ENABLED: "true"
      LOCATION_MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/${MONGO_DATABASE}?authSource=admin
      LOCATION_MONGO_DATABASE: ${MONGO_DATABASE}
      LOCATION_HISTORY_SPOOL_ENABLED: "true"
      LOCATION_HISTORY_SPOOL_DIR: /app/spool/location-history
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/telematics-spool:/app/spool
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  safety-api:
    build:
      context: ../tms-safety-api
      dockerfile: Dockerfile
    image: ${IMAGE_REGISTRY:-local}/svtms-safety-api:${IMAGE_TAG:-latest}
    container_name: svtms-safety-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8087
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  message-api:
    build:
      context: ..
      dockerfile: tms-message-api/Dockerfile
    image: ${IMAGE_REGISTRY:-local}/svtms-message-api:${IMAGE_TAG:-latest}
    container_name: svtms-message-api
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    environment:
      SERVER_PORT: 8088
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/tms-message-api;MODE=PostgreSQL;AUTO_SERVER=TRUE
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/message-api:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    image: ${IMAGE_REGISTRY:-local}/svtms-api-gateway:${IMAGE_TAG:-latest}
    container_name: svtms-api-gateway
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      core-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
      driver-app-api:
        condition: service_healthy
      telematics-api:
        condition: service_healthy
      safety-api:
        condition: service_healthy
    environment:
      SERVER_PORT: 8086
      CORE_API_BASE_URL: http://core-api:8080
      AUTH_API_BASE_URL: http://auth-api:8083
      DRIVER_APP_API_BASE_URL: http://driver-app-api:8084
      TELEMATICS_API_BASE_URL: http://telematics-api:8082
      SAFETY_API_BASE_URL: http://safety-api:8087
      GATEWAY_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  admin-web-ui:
    build:
      context: ../tms-admin-web-ui
      dockerfile: Dockerfile
    image: ${IMAGE_REGISTRY:-local}/svtms-admin-web-ui:${IMAGE_TAG:-latest}
    container_name: svtms-admin-web-ui
    restart: unless-stopped
    depends_on:
      api-gateway:
        condition: service_healthy
    logging: *default-logging

  nginx:
    image: nginx:stable
    container_name: svtms-nginx
    restart: unless-stopped
    depends_on:
      admin-web-ui:
        condition: service_started
      api-gateway:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/site.conf:/etc/nginx/conf.d/site.conf:ro
      - ${DATA_ROOT:-/srv/svtms}/certs:/etc/letsencrypt
      - ${DATA_ROOT:-/srv/svtms}/webroot:/var/www/certbot
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: svtms-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    depends_on:
      core-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
      driver-app-api:
        condition: service_healthy
      telematics-api:
        condition: service_healthy
      safety-api:
        condition: service_healthy
      message-api:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ${DATA_ROOT:-/srv/svtms}/monitoring/prometheus:/prometheus
    logging: *default-logging

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: svtms-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ${DATA_ROOT:-/srv/svtms}/monitoring/alertmanager:/alertmanager
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.1.4
    container_name: svtms-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
      alertmanager:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ${DATA_ROOT:-/srv/svtms}/monitoring/grafana:/var/lib/grafana
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: svtms-node-exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    logging: *default-logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: svtms-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    logging: *default-logging

  certbot:
    image: certbot/certbot:v2.6.0
    container_name: svtms-certbot
    entrypoint: ["/bin/sh", "-c"]
    command: "sleep infinity"
    volumes:
      - ${DATA_ROOT:-/srv/svtms}/certs:/etc/letsencrypt
      - ${DATA_ROOT:-/srv/svtms}/webroot:/var/www/certbot
    logging: *default-logging
