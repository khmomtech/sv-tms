---
# G Team pre-shift / load checklist template
version: 1
fields:
  - id: date
    label: Date
    type: date
  - id: shift
    label: Shift
    type: string
  - id: driver_id
    label: Driver ID
    type: string
  - id: vehicle_reg
    label: Vehicle reg
    type: string
  - id: gvwr
    label: GVWR (kg)
    type: number
  - id: cargo_weight
    label: Cargo weight (kg)
    type: number
  - id: axle_weights
    label: Axle weights (kg)
    type: list
  - id: distribution_ok
    label: Cargo distribution acceptable
    type: boolean
  - id: secured
    label: Cargo secured (straps/chocks)
    type: boolean
  - id: photos_before
    label: Photos before loading (paths/uploads)
    type: files
  - id: photos_after
    label: Photos after securing (paths/uploads)
    type: files
  - id: PPE
    label: PPE used by loaders
    type: boolean
  - id: issues
    label: Issues observed
    type: text
  - id: escalate
    label: Escalate to Safety? (yes/no)
    type: boolean
  - id: signature
    label: Driver/Loader signature (name)
    type: string
  - id: submit_time
    label: Submission timestamp
    type: datetime

instructions:
  - "Take clear photos before and after securing the load."
  - "Upload photos to the `uploads/` area and paste paths above."
  - "If `escalate` is true, create a case and select category: SAFETY. Attach photos and checklist."
