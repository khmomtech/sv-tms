name: tms_customer_app
description: SV-TMS Customer mobile app (minimal scaffold)
publish_to: 'none'
version: 0.1.0
environment:
  sdk: ">=2.18.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^0.13.6
  shared_preferences: ^2.1.1
  flutter_secure_storage: ^9.2.4
  provider: ^6.0.5
  url_launcher: ^6.1.10
  local_auth: ^2.1.6
  easy_localization: ^3.0.3
  intl: 0.20.2
  # OpenAPI generated client removed. Use lightweight `GeneratedApiService` HTTP wrapper instead.
  
  stomp_dart_client: ^2.1.3
  web_socket_channel: any
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lang/
    - assets/images/
    - assets/images/icons/
    - assets/data/articles.json
  
  fonts:
    - family: NotoSansKhmer
      fonts:
        - asset: assets/fonts/NotoSansKhmer-Regular.ttf
        - asset: assets/fonts/NotoSansKhmer-Bold.ttf
          weight: 700
    - family: Khmer
      fonts:
        - asset: assets/fonts/Khmer-Regular.ttf
