spring.application.name=api-gateway
spring.servlet.multipart.enabled=true
server.port=${SERVER_PORT:8086}
server.address=0.0.0.0
management.endpoints.web.exposure.include=health,info,prometheus
spring.mvc.problemdetails.enabled=true
management.health.mongo.enabled=false
management.health.redis.enabled=false

gateway.cors.allowed-origins=${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8081}
gateway.rate-limit.per-minute=${GATEWAY_RATE_LIMIT_PER_MINUTE:600}
gateway.routes.auth=${AUTH_API_BASE_URL:http://localhost:8083}
gateway.routes.core=${CORE_API_BASE_URL:http://localhost:8080}
gateway.routes.driver=${DRIVER_APP_API_BASE_URL:http://localhost:8084}
gateway.routes.telematics=${TELEMATICS_API_BASE_URL:http://localhost:8082}
gateway.routes.safety=${SAFETY_API_BASE_URL:http://localhost:8087}
