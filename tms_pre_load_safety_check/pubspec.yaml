name: svtms_safety_check
description: Safety team mobile app for SV Trucking TMS
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  mobile_scanner: 7.0.0
  easy_localization: ^3.0.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  connectivity_plus: ^5.0.2
  intl: ">=0.19.0 <0.21.0"
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
