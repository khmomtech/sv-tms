geocode.google.enabled=false

# =============================================================================
# Kafka Producer — Durability & Safety Settings
# Applied to all services that import this file (core-api, auth-api,
# driver-app-api). Works with Spring Boot's autoconfigured KafkaTemplate.
# =============================================================================

# Bootstrap servers — always overridden per environment via env var
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# acks=all: producer waits for acknowledgement from ALL in-sync replicas before
# returning success. Combined with min.insync.replicas=2 on the broker, this
# means a message is confirmed written to at least 2 brokers before we proceed.
spring.kafka.producer.acks=all

# Retry up to 5 times on transient broker failures (leader election, timeout).
spring.kafka.producer.retries=5

# Idempotent producer: Kafka assigns a sequence number per message so that
# broker-side deduplication prevents duplicates even when retries occur.
# Requires acks=all and max.in.flight.requests.per.connection <= 5.
spring.kafka.producer.properties.enable.idempotence=true

# Must be <= 5 when idempotence is enabled to preserve message ordering.
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5

# Total time the producer will spend on retries before giving up on a send.
# 120s gives room for a broker restart or leader re-election.
spring.kafka.producer.properties.delivery.timeout.ms=120000
