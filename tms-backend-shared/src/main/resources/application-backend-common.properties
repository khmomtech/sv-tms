# Common local/runtime defaults shared by split API modules.
# Keep app identity and port module-specific.

spring.main.allow-bean-definition-overriding=true
spring.main.lazy-initialization=true
spring.data.jpa.repositories.bootstrap-mode=deferred

# No defaults — application refuses to start if these env vars are absent.
app.security.jwt.access-secret=${JWT_ACCESS_SECRET}
app.security.jwt.refresh-secret=${JWT_REFRESH_SECRET}
app.security.jwt.access-ttl-ms=${JWT_ACCESS_TTL_MS:900000}
app.security.jwt.refresh-ttl-ms=${JWT_REFRESH_TTL_MS:2592000000}

app.driver.skip-device-check=${APP_DRIVER_SKIP_DEVICE_CHECK:false}
app.driver.login-bypass=${APP_DRIVER_LOGIN_BYPASS:false}
app.reviewer.bypass=${APP_REVIEWER_BYPASS:false}
app.features.dispatch-workflow-emergency-bypass=${APP_FEATURES_DISPATCH_WORKFLOW_EMERGENCY_BYPASS:false}

server.address=0.0.0.0
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html; charset=UTF-8

