spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allow-credentials=true
app.cors.allowed-origins=https://svtms.svtrucking.biz,https://svsafety.svtrucking.biz,https://svtmsapi.svtrucking.biz,http://localhost:4200,http://localhost:8080,http://localhost:8083,http://localhost:8084,http://10.0.2.2:8080,http://192.168.0.64:4200
app.websocket.allowed-origins=https://svtms.svtrucking.biz,https://svsafety.svtrucking.biz,https://svtmsapi.svtrucking.biz,http://localhost:4200,http://localhost:8080,http://localhost:8083,http://localhost:8084,http://192.168.0.64:4200

