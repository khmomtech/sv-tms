# ── Test profile — overridden by @DynamicPropertySource in TelematicsContractTest ──

# DataSource (placeholder — overridden by TestContainers)
spring.datasource.url=jdbc:postgresql://localhost:5432/telematics_test
spring.datasource.username=test
spring.datasource.password=test
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Disable real Redis — use in-memory cache for tests
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=simple

# Disable MongoDB
location.mongo.enabled=false
spring.data.mongodb.repositories.enabled=false

# JWT secret — must be ≥32 bytes for HS256
app.security.jwt.access-secret=test-jwt-secret-for-integration-tests-min32

# Internal API key
telematics.internal.api-key=test-internal-key-123

# Unreachable backend — dispatch context returns null gracefully
main.backend.url=http://127.0.0.1:19999

# Tracking session TTL — short for test freshness
app.security.jwt.tracking-ttl-ms=3600000

# Disable spool files during tests
location.history.spool.enabled=false

# Partition maintenance — keep enabled so Flyway-created partitions pass validation
location.history.partitioning.enabled=true
location.history.partitioning.months-ahead=1
location.history.partitioning.retain-months=3
location.history.postgres.partition-maintenance.enabled=true
location.history.postgres.write.enabled=true
location.history.read.require-postgres=true

# WebSocket CORS
app.websocket.allowed-origins=http://localhost
app.cors.allowed-origins=http://localhost

# Silence noisy loggers during tests
logging.level.org.springframework=WARN
logging.level.com.svtrucking.telematics=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.testcontainers=WARN
logging.level.com.github.dockerjava=WARN
