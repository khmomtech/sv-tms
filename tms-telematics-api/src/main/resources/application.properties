# =========================================
#  Application Info
# =========================================
spring.application.name=tms-telematics-api

# =========================================
# Server
# =========================================
server.address=0.0.0.0
server.port=8082

# =========================================
# 🔐 JWT / Security — must match tms-backend's JWT_ACCESS_SECRET
# =========================================
# Coop with fallback from backend-shared and tms-core-api for non-local runs.
app.security.jwt.access-secret=${JWT_ACCESS_SECRET:SuperSecureKeyForJWTAuthentication2024SuperSecureKeyForJWT}
app.security.jwt.access-ttl-ms=${JWT_ACCESS_TTL_MS:900000}
app.security.jwt.tracking-ttl-ms=${TRACKING_TTL_MS:86400000}
app.security.jwt.allowed-clock-skew-seconds=${JWT_CLOCK_SKEW_SECONDS:300}

# =========================================
# Internal API key (X-Internal-Api-Key header)
# =========================================
telematics.internal.api-key=${TELEMATICS_INTERNAL_API_KEY:}

# =========================================
# Main backend URL (for DispatchContextCacheService)
# =========================================
main.backend.url=${MAIN_BACKEND_URL:http://localhost:8080}

# =========================================
# 🛢️ PostgreSQL — telematics system of record
# =========================================
spring.datasource.url=jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DATABASE:svlogistics_telematics}
spring.datasource.username=${PG_USER:tele_user}
spring.datasource.password=${PG_PASSWORD:telepass}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=30000

# =========================================
# 🧠 Hibernate JPA
# =========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# =========================================
# 🔄 Flyway — always enabled
# =========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# =========================================
# 🛰️ MongoDB — optional fallback/export history sink
# =========================================
location.mongo.enabled=${LOCATION_MONGO_ENABLED:false}
location.mongo.uri=${LOCATION_MONGO_URI:}
location.mongo.database=${LOCATION_MONGO_DB:svlogistics_telematics}
location.mongo.ttl-days=${LOCATION_MONGO_TTL_DAYS:60}
spring.data.mongodb.uri=${LOCATION_MONGO_URI:mongodb://localhost:27017/${LOCATION_MONGO_DB:svlogistics_telematics}}
spring.data.mongodb.database=${LOCATION_MONGO_DB:svlogistics_telematics}
spring.data.mongodb.repositories.enabled=false

# =========================================
# 🔴 Redis — isolated prefix tele:location:
# =========================================
# In Docker Compose, REDIS_HOST is set to 'redis'; default to redis in containerized environments.
# For local host-based standalone runs, override with REDIS_HOST=localhost if needed.
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.database=0
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

spring.cache.type=redis
spring.cache.redis.time-to-live=300000

app.cache.live-location.ttl=300000
app.cache.live-location.prefix=tele:location:

# =========================================
# 📡 Location tracking config
# =========================================
tracking.server_throttle_ms=3000
tracking.server_min_distance_m=5
tracking.batch_flush_ms=2000
tracking.batch_max_records=2000
tracking.queue_capacity=50000
tracking.server_min_time_ms=8000
tracking.max_idle_keepalive_ms=60000

# Location history store strategy
location.history.postgres.write.enabled=${LOCATION_HISTORY_POSTGRES_WRITE_ENABLED:true}
location.history.read.require-postgres=${LOCATION_HISTORY_READ_REQUIRE_POSTGRES:true}
location.history.partitioning.enabled=${LOCATION_HISTORY_PARTITIONING_ENABLED:true}
location.history.partitioning.months-ahead=${LOCATION_HISTORY_PARTITIONING_MONTHS_AHEAD:2}
location.history.partitioning.retain-months=${LOCATION_HISTORY_PARTITIONING_RETAIN_MONTHS:3}

# Local fallback spool for optional secondary history sink failures
location.history.spool.enabled=${LOCATION_HISTORY_SPOOL_ENABLED:true}
location.history.spool.dir=${LOCATION_HISTORY_SPOOL_DIR:spool/location-history}
location.history.spool.max-disk-mb=${LOCATION_HISTORY_SPOOL_MAX_DISK_MB:2048}
location.history.spool.replay.batch-size=${LOCATION_HISTORY_SPOOL_REPLAY_BATCH_SIZE:2000}
location.history.spool.replay.interval-ms=${LOCATION_HISTORY_SPOOL_REPLAY_INTERVAL_MS:10000}

# PostgreSQL history retention / partition maintenance
location.history.postgres.partition-maintenance.enabled=${LOCATION_HISTORY_POSTGRES_PARTITION_MAINTENANCE_ENABLED:true}
location.history.postgres.partition-maintenance.interval-ms=${LOCATION_HISTORY_POSTGRES_PARTITION_MAINTENANCE_INTERVAL_MS:3600000}

# =========================================
# WebSocket allowed origins
# =========================================
app.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}

# =========================================
# Dispatch context cache (Caffeine)
# =========================================
dispatch.context.cache.ttl-seconds=${DISPATCH_CONTEXT_CACHE_TTL_SECONDS:30}

# =========================================
# Geocoding (passive, pass-through)
# =========================================
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}
geocode.osm.enabled=true
geocode.photon.enabled=true
geocode.photon.base=https://photon.komoot.io
geocode.google.enabled=false
geocode.countryBias=KH

# =========================================
# Actuator / Prometheus
# =========================================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
# MongoDB health indicator disabled by default (mongo is an optional secondary sink)
# Set MANAGEMENT_HEALTH_MONGO_ENABLED=true only when location.mongo.enabled=true
management.health.mongo.enabled=${MANAGEMENT_HEALTH_MONGO_ENABLED:false}
telemetry.stream.consumer.mode=${TELEMETRY_STREAM_CONSUMER_MODE:offset}
telemetry.stream.consumer.group-name=${TELEMETRY_STREAM_CONSUMER_GROUP_NAME:telematics-consumers}
telemetry.stream.consumer.consumer-name=${TELEMETRY_STREAM_CONSUMER_CONSUMER_NAME:${HOSTNAME:telematics-api}}
telemetry.stream.consumer.health.warn-lag-entries=${TELEMETRY_STREAM_CONSUMER_HEALTH_WARN_LAG_ENTRIES:200}
telemetry.stream.consumer.health.fail-lag-entries=${TELEMETRY_STREAM_CONSUMER_HEALTH_FAIL_LAG_ENTRIES:2000}
telemetry.stream.consumer.health.warn-poll-staleness-ms=${TELEMETRY_STREAM_CONSUMER_HEALTH_WARN_POLL_STALENESS_MS:15000}
telemetry.stream.consumer.health.fail-poll-staleness-ms=${TELEMETRY_STREAM_CONSUMER_HEALTH_FAIL_POLL_STALENESS_MS:60000}

# =========================================
# Logging
# =========================================
logging.level.org.springframework=INFO
logging.level.com.svtrucking.telematics=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.web.socket=WARN

spring.jackson.serialization.fail-on-empty-beans=false
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.main.allow-bean-definition-overriding=true
